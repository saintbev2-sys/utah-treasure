<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Field Inspector Route Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&display=swap');

:root {
–bg: #060d10;
–surface: #0e1f26;
–surface2: #142530;
–green: #00ff88;
–green-dim: #00ff8825;
–blue: #40c8ff;
–blue-dim: #40c8ff25;
–orange: #ffaa00;
–orange-dim: #ffaa0025;
–purple: #e040fb;
–purple-dim: #e040fb25;
–red: #ff5252;
–red-dim: #ff525225;
–yellow: #ffd54f;
–yellow-dim: #ffd54f25;
–text: #ffffff;
–muted: #7a9aaa;
–border: #1e3a4a;
}

- { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:var(–bg); font-family:‘Share Tech Mono’,monospace; color:var(–text); min-height:100vh; }
  button, input, select, textarea { font-family:‘Share Tech Mono’,monospace; }
  ::-webkit-scrollbar { width:3px; }
  ::-webkit-scrollbar-thumb { background:var(–green-dim); border-radius:2px; }

/* HEADER */
.header { background: linear-gradient(135deg, #0a1a0e 0%, #0a1624 100%); border-bottom: 1px solid var(–green); padding: 16px 16px 12px; position: sticky; top:0; z-index:100; box-shadow: 0 4px 20px rgba(0,230,118,0.1); }
.header-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
.header-label { font-size:9px; letter-spacing:4px; color:var(–green); font-family:‘Rajdhani’,sans-serif; }
.header-title { font-size:22px; font-weight:700; font-family:‘Rajdhani’,sans-serif; letter-spacing:2px; }
.header-right { text-align:right; }
.survey-count { font-size:28px; font-weight:700; color:var(–green); font-family:‘Rajdhani’,sans-serif; line-height:1; }
.survey-rate { font-size:10px; color:var(–green); opacity:0.7; }
.name-row { display:flex; align-items:center; gap:6px; margin-top:2px; }
.name-display { font-size:11px; color:#86efac; cursor:pointer; }
.name-input { background:rgba(0,0,0,0.4); border:1px solid var(–border); border-radius:4px; color:var(–text); font-size:11px; padding:3px 8px; width:160px; outline:none; }

.stats-row { display:flex; gap:8px; }
.stat-box { flex:1; background:rgba(0,0,0,0.3); border-radius:8px; padding:8px 10px; }
.stat-label { font-size:9px; letter-spacing:2px; margin-bottom:3px; font-weight:700; }
.stat-value { font-size:16px; font-weight:bold; font-family:‘Rajdhani’,sans-serif; }

/* TABS */
.tabs { display:flex; background:#0a1820; border-bottom:2px solid var(–border); overflow-x:auto; }
.tab { flex:1; min-width:60px; padding:11px 4px; background:none; border:none; border-bottom:3px solid transparent; color:#6a8a9a; font-size:10px; letter-spacing:1px; font-weight:bold; cursor:pointer; transition:all 0.2s; font-family:‘Rajdhani’,sans-serif; white-space:nowrap; }
.tab.active { border-bottom-color:var(–green); color:var(–green); }

/* CONTENT */
.content { padding:14px; max-width:600px; margin:0 auto; }

/* ACTION BUTTONS */
.action-row { display:flex; gap:10px; margin-bottom:14px; }
.action-btn { flex:1; padding:14px; border-radius:10px; border:2px solid; font-size:12px; letter-spacing:2px; font-weight:bold; cursor:pointer; font-family:‘Rajdhani’,sans-serif; transition:all 0.2s; }
.btn-optimize { background:linear-gradient(135deg,#003d1a,#006830); border-color:var(–green); color:var(–green); }
.btn-route { background:linear-gradient(135deg,#0a1a2e,#0d2f5c); border-color:var(–blue); color:var(–blue); }

/* JOB CARDS */
.job-card { background:#0e2030; border-radius:12px; padding:14px; margin-bottom:10px; border:1px solid #1e3a4a; position:relative; overflow:hidden; transition:opacity 0.3s; }
.job-card.done { opacity:0.35; }
.job-card .side-bar { position:absolute; left:0; top:0; bottom:0; width:4px; }
.job-inner { margin-left:10px; display:flex; justify-content:space-between; gap:8px; }
.job-info { flex:1; min-width:0; }
.job-badges { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:6px; align-items:center; }
.badge { font-size:10px; border-radius:4px; padding:3px 8px; letter-spacing:1px; font-weight:bold; border:1px solid; font-family:‘Rajdhani’,sans-serif; }
.priority-dot { font-size:10px; font-weight:bold; }
.job-address { font-size:13px; color:#ffffff; margin-bottom:3px; font-weight:600; }
.job-meta { font-size:11px; color:#7a9aaa; margin-bottom:3px; }
.job-type { font-size:10px; color:var(–green); margin-bottom:5px; font-weight:600; }
.job-pay { font-size:18px; font-weight:bold; color:var(–green); font-family:‘Rajdhani’,sans-serif; }
.job-pay.fi-pay { color:var(–purple); }

/* NEW: Travel + Call info row */
.job-extra { display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; font-size:10px; font-family:‘Rajdhani’,sans-serif; }
.extra-chip { background:rgba(0,0,0,0.4); border:1px solid var(–border); border-radius:4px; padding:3px 7px; letter-spacing:0.5px; display:flex; align-items:center; gap:4px; }
.extra-chip.travel { color:var(–blue); border-color:#40c8ff44; }
.extra-chip.attempts { color:var(–orange); border-color:#ffaa0044; }
.extra-chip.last-call { color:var(–muted); }
.extra-chip.followup-due { color:var(–red); border-color:#ff525266; background:rgba(255,82,82,0.08); animation:pulseRed 2s infinite; }
.extra-chip.refused-warn { color:var(–red); border-color:var(–red); background:rgba(255,82,82,0.15); font-weight:bold; }
@keyframes pulseRed { 0%,100%{opacity:1;} 50%{opacity:0.55;} }

.job-actions { display:flex; flex-direction:column; gap:5px; flex-shrink:0; }
.jbtn { border-radius:6px; padding:6px 10px; font-size:10px; border:1px solid; cursor:pointer; font-family:‘Rajdhani’,sans-serif; letter-spacing:1px; font-weight:bold; transition:all 0.15s; background:rgba(0,0,0,0.4); white-space:nowrap; }
.jbtn:active { transform:scale(0.95); }

/* FI BADGE */
.fi-only-badge { background:var(–purple-dim); border:1px solid var(–purple); color:var(–purple); font-size:10px; border-radius:4px; padding:3px 8px; letter-spacing:1px; font-family:‘Rajdhani’,sans-serif; font-weight:bold; }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:999; display:flex; align-items:center; justify-content:center; padding:20px; overflow-y:auto; }
.modal { background:#0a1a14; border:1px solid var(–green); border-radius:16px; padding:22px; max-width:380px; width:100%; max-height:90vh; overflow-y:auto; }
.modal-label { font-size:9px; letter-spacing:3px; color:var(–green); margin-bottom:4px; font-family:‘Rajdhani’,sans-serif; }
.modal-name { font-size:16px; font-weight:bold; font-family:‘Rajdhani’,sans-serif; }
.modal-sub { font-size:11px; margin-bottom:14px; }
.msg-preview { background:rgba(255,255,255,0.04); border-radius:10px; padding:12px; font-size:12px; color:#d1fae5; line-height:1.7; margin-bottom:16px; border:1px solid var(–border); }
.modal-btns { display:flex; gap:10px; }
.modal-cancel { flex:1; padding:11px; border-radius:8px; background:var(–red-dim); border:1px solid var(–red); color:var(–red); cursor:pointer; font-size:11px; letter-spacing:2px; font-family:‘Rajdhani’,sans-serif; font-weight:bold; }
.modal-send { flex:2; padding:11px; border-radius:8px; background:linear-gradient(135deg,#003d1a,#005724); border:1px solid var(–green); color:var(–green); cursor:pointer; font-size:11px; letter-spacing:2px; font-family:‘Rajdhani’,sans-serif; font-weight:bold; }

/* TEMPLATE PICKER */
.template-picker { display:flex; flex-direction:column; gap:8px; margin-bottom:14px; }
.template-option { background:rgba(0,0,0,0.35); border:1px solid var(–border); border-radius:8px; padding:10px 12px; cursor:pointer; transition:all 0.15s; text-align:left; color:var(–text); font-family:‘Share Tech Mono’,monospace; }
.template-option.active { border-color:var(–green); background:rgba(0,255,136,0.08); box-shadow:0 0 12px rgba(0,255,136,0.15); }
.template-option:active { transform:scale(0.98); }
.template-title { font-size:11px; font-family:‘Rajdhani’,sans-serif; font-weight:bold; letter-spacing:1px; margin-bottom:2px; }
.template-desc { font-size:10px; color:var(–muted); }
.template-option.warn .template-title { color:var(–red); }
.template-option.warn { border-color:#ff525244; }
.template-option.warn.active { border-color:var(–red); background:rgba(255,82,82,0.08); box-shadow:0 0 12px rgba(255,82,82,0.15); }

/* FORM */
.form-card { background:var(–surface); border:1px solid var(–green-dim); border-radius:12px; padding:20px; }
.form-label { font-size:9px; letter-spacing:2px; color:#86efac; margin-bottom:5px; font-family:‘Rajdhani’,sans-serif; }
.form-input { width:100%; padding:10px 12px; background:rgba(0,0,0,0.4); border:1px solid var(–border); border-radius:6px; color:var(–text); font-size:13px; outline:none; margin-bottom:12px; font-family:‘Share Tech Mono’,monospace; }
.form-input:focus { border-color:var(–green); }
.toggle-group { display:flex; gap:8px; margin-bottom:12px; }
.toggle-btn { flex:1; padding:10px; border-radius:6px; border:1px solid var(–border); background:rgba(0,0,0,0.3); color:var(–muted); cursor:pointer; font-size:11px; font-weight:bold; font-family:‘Rajdhani’,sans-serif; letter-spacing:1px; transition:all 0.2s; }
.toggle-btn.active-allstate { background:var(–blue-dim); border-color:var(–blue); color:var(–blue); }
.toggle-btn.active-farmers { background:var(–orange-dim); border-color:var(–orange); color:var(–orange); }
.toggle-btn.active-fi { background:var(–purple-dim); border-color:var(–purple); color:var(–purple); }
.toggle-btn.active-high { background:rgba(239,83,80,0.15); border-color:var(–red); color:var(–red); }
.toggle-btn.active-medium { background:var(–orange-dim); border-color:var(–orange); color:var(–orange); }
.toggle-btn.active-low { background:rgba(74,101,114,0.2); border-color:var(–muted); color:var(–muted); }
.fi-notice { background:var(–purple-dim); border:1px solid var(–purple); border-radius:8px; padding:10px 12px; font-size:11px; color:var(–purple); margin-bottom:12px; line-height:1.5; }
.add-btn { width:100%; padding:14px; border-radius:10px; background:linear-gradient(135deg,#003d1a,#005724); border:1px solid var(–green); color:var(–green); font-size:13px; letter-spacing:3px; font-weight:bold; cursor:pointer; font-family:‘Rajdhani’,sans-serif; box-shadow:0 0 16px rgba(0,230,118,0.2); }

/* STATS */
.stats-card { background:var(–surface); border:1px solid var(–green-dim); border-radius:12px; padding:20px; margin-bottom:12px; }
.stats-title { font-size:10px; letter-spacing:3px; color:var(–green); margin-bottom:16px; font-family:‘Rajdhani’,sans-serif; }
.stat-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.stat-name { color:#86efac; font-size:13px; }
.stat-sub { font-size:10px; color:var(–muted); }
.stat-amount { font-weight:bold; font-size:18px; font-family:‘Rajdhani’,sans-serif; }
.divider { height:1px; background:var(–border); margin:10px 0; }
.progress-bar-bg { background:var(–border); border-radius:100px; height:7px; overflow:hidden; margin-top:5px; }
.progress-bar-fill { height:100%; border-radius:100px; transition:width 0.5s; }

/* TEXT TAB */
.carrier-section { background:var(–surface); border-radius:12px; padding:16px; margin-bottom:12px; }
.carrier-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.carrier-name { font-size:16px; font-weight:bold; font-family:‘Rajdhani’,sans-serif; }
.carrier-tag { font-size:9px; border-radius:5px; padding:3px 10px; border:1px solid; font-family:‘Rajdhani’,sans-serif; }
.text-job-row { display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.3); border-radius:8px; padding:10px 12px; border:1px solid var(–border); margin-bottom:8px; }
.text-job-name { font-size:12px; }
.text-job-addr { font-size:10px; color:var(–muted); }
.text-send-btn { border-radius:6px; padding:7px 12px; font-size:10px; border:1px solid; cursor:pointer; font-family:‘Rajdhani’,sans-serif; font-weight:bold; letter-spacing:1px; }
.fi-section { background:var(–surface); border-radius:12px; padding:16px; margin-bottom:12px; border:1px solid var(–purple-dim); }
.fi-job-row { background:rgba(0,0,0,0.3); border-radius:8px; padding:10px 12px; border:1px solid var(–purple-dim); margin-bottom:8px; }
.fi-no-contact { font-size:10px; color:var(–purple); margin-top:3px; }

.empty-msg { text-align:center; color:var(–muted); font-size:12px; padding:12px; }

.section-header { font-size:10px; letter-spacing:3px; color:var(–green); margin-bottom:12px; font-family:‘Rajdhani’,sans-serif; }

/* MAP TAB */
#map-container { width:100%; height:calc(100vh - 180px); position:relative; }
.map-status { padding:14px 16px; background:#0a1820; border-bottom:1px solid var(–border); display:flex; align-items:center; gap:8px; font-size:11px; }
.map-dot { width:10px; height:10px; border-radius:50%; background:var(–green); box-shadow:0 0 8px var(–green); animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.6;transform:scale(1.3);} }
.map-legend { padding:10px 16px; background:#0a1820; border-top:1px solid var(–border); display:flex; gap:14px; flex-wrap:wrap; font-size:10px; }
.legend-item { display:flex; align-items:center; gap:5px; }

/* JOB TIMER */
.timer-chip { background:rgba(0,255,136,0.08); border:1px solid var(–green); color:var(–green); border-radius:4px; padding:3px 7px; letter-spacing:0.5px; display:flex; align-items:center; gap:4px; font-size:10px; font-family:‘Rajdhani’,sans-serif; font-weight:bold; }
.timer-chip.running { animation:pulseGreen 1.5s infinite; }
.timer-chip.done { color:var(–muted); border-color:var(–border); background:rgba(0,0,0,0.4); }
@keyframes pulseGreen { 0%,100%{box-shadow:0 0 0 0 rgba(0,255,136,0.4);} 50%{box-shadow:0 0 0 6px rgba(0,255,136,0);} }
.jbtn.timer-start { color:var(–green); border-color:#00ff8866; }
.jbtn.timer-stop { color:var(–red); border-color:var(–red); background:rgba(255,82,82,0.15); animation:pulseRed 1.5s infinite; }

/* TOAST */
.toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#0a2a18; border:1px solid var(–green); color:var(–green); padding:12px 20px; border-radius:8px; font-family:‘Rajdhani’,sans-serif; font-size:12px; letter-spacing:2px; z-index:9999; box-shadow:0 0 20px rgba(0,255,136,0.3); animation:toastIn 0.3s; }
@keyframes toastIn { from{opacity:0;transform:translate(-50%,20px);} to{opacity:1;transform:translate(-50%,0);} }
</style>

</head>
<body>
<div id="app"></div>

<script>
const PAY = { Allstate: 14.50, Farmers: 14.50, 'FI-NC': 14.50, 'FI-DH': 14.50 };
const CC = { Allstate: '#40c8ff', Farmers: '#ffaa00', 'FI-NC': '#e040fb', 'FI-DH': '#ffd54f' };
const CLIENT_LABELS = { Allstate: 'Allstate', Farmers: 'Farmers', 'FI-NC': 'FI — No Contact', 'FI-DH': 'FI — Door Hanger' };

// Follow-up window in hours - if call attempt not followed by text within this, flag it
const FOLLOWUP_HOURS = 24;

// === TEMPLATE LIBRARY ===
// Each template returns an object: { title, desc, build(job, name) -> string, warn? }
const TEMPLATES = {
  Allstate: [
    {
      key: 'intro',
      title: '📋 Standard Intro',
      desc: 'First contact - heads up I am coming',
      build: (j, n) => `Hi ${j.contactName}, this is ${n} with Allstate Insurance field services. I am scheduled to conduct an exterior survey of your property at ${j.address} for claim #${j.claimNumber}. This is an EXTERIOR ONLY inspection — no interior access needed. I will be visiting shortly. Questions? Reply here. Thank you!`
    },
    {
      key: 'busy',
      title: '⏰ Been Busy / Coming This Week',
      desc: 'You called, no answer - just letting them know',
      build: (j, n) => `Hi ${j.contactName}, this is ${n} with Allstate field services. I tried to reach you about the exterior survey at ${j.address} (claim #${j.claimNumber}). My week has been busy but I will be stopping by sometime this week to complete it. This is EXTERIOR ONLY — you do not need to be home. Thanks for your patience!`
    },
    {
      key: 'lasttry',
      title: '⚠️ LAST TRY - Before Refused',
      desc: 'Final attempt warning - cannot reach / no access',
      warn: true,
      build: (j, n) => `Hi ${j.contactName}, this is ${n} with Allstate field services regarding claim #${j.claimNumber} at ${j.address}. I have made multiple attempts to reach you and complete the exterior survey without success. This is my final attempt before I have to report the inspection as REFUSED, which may affect your claim. Please reply or call me back today so I can complete this. Thank you.`
    }
  ],
  Farmers: [
    {
      key: 'intro',
      title: '📋 Standard Intro',
      desc: 'First contact - heads up I am coming',
      build: (j, n) => `Hi ${j.contactName}, this is ${n} with Farmers Insurance field services. I am assigned to complete an exterior property survey at ${j.address} for claim #${j.claimNumber}. This is an EXTERIOR inspection only — you do not need to be home. I will be by shortly. Questions? Reply here. Thank you!`
    },
    {
      key: 'busy',
      title: '⏰ Been Busy / Coming This Week',
      desc: 'You called, no answer - just letting them know',
      build: (j, n) => `Hi ${j.contactName}, this is ${n} with Farmers field services. I tried to reach you about the exterior survey at ${j.address} (claim #${j.claimNumber}). It has been a busy week on my end but I will be stopping by sometime this week to take care of it. EXTERIOR ONLY — no need to be home. Thanks for your patience!`
    },
    {
      key: 'lasttry',
      title: '⚠️ LAST TRY - Before Refused',
      desc: 'Final attempt warning - cannot reach / no access',
      warn: true,
      build: (j, n) => `Hi ${j.contactName}, this is ${n} with Farmers field services regarding claim #${j.claimNumber} at ${j.address}. I have tried multiple times to reach you and complete the exterior survey without success. This is my final attempt before I must report the inspection as REFUSED, which may impact your claim. Please reply or call me back today. Thank you.`
    }
  ]
};

function getTemplates(client) { return TEMPLATES[client] || []; }

// LOAD saved data
function loadSaved() {
  try {
    return {
      jobs: JSON.parse(localStorage.getItem('routepro_jobs') || 'null'),
      done: JSON.parse(localStorage.getItem('routepro_done') || 'null'),
      name: localStorage.getItem('routepro_name') || null,
      contactLog: JSON.parse(localStorage.getItem('routepro_contactlog') || '{}')
    };
  } catch(e) { return {}; }
}

function saveData() {
  try {
    localStorage.setItem('routepro_jobs', JSON.stringify(state.jobs));
    localStorage.setItem('routepro_done', JSON.stringify(state.done));
    localStorage.setItem('routepro_name', state.name);
    localStorage.setItem('routepro_contactlog', JSON.stringify(state.contactLog));
  } catch(e) {}
}

const saved = loadSaved();

let state = {
  jobs: saved.jobs || [
    { id:1, address:"1234 W 4700 S, Taylorsville, UT", client:"Allstate", contactName:"John Smith", contactPhone:"8015550101", priority:"high", claimNumber:"ALL-2024-0091" },
    { id:2, address:"892 E 3300 S, Salt Lake City, UT", client:"Farmers", contactName:"Maria Lopez", contactPhone:"8015550182", priority:"high", claimNumber:"FRM-2024-0342" },
    { id:3, address:"3401 S 900 W, South Salt Lake, UT", client:"FI-NC", contactName:"", contactPhone:"", priority:"medium", claimNumber:"FI-2024-0055" },
    { id:4, address:"5620 S Redwood Rd, Murray, UT", client:"Farmers", contactName:"Tanya Brooks", contactPhone:"8015550374", priority:"medium", claimNumber:"FRM-2024-0388" },
    { id:5, address:"410 E 12300 S, Draper, UT", client:"FI-DH", contactName:"", contactPhone:"", priority:"low", claimNumber:"FI-2024-0061" },
    { id:6, address:"2245 W 7800 S, West Jordan, UT", client:"Allstate", contactName:"Sandra Lee", contactPhone:"8015550556", priority:"medium", claimNumber:"ALL-2024-0117" },
  ],
  done: saved.done || [],
  tab: 'route',
  name: saved.name || 'Your Name',
  editName: false,
  modal: null,
  selectedTemplate: 'intro',
  optimized: false,
  userLat: null,
  userLng: null,
  // Contact log: { jobId: { calls: [{time, type}], texts: [{time, type}], coords: {lat, lng}, travelMin: number } }
  contactLog: saved.contactLog || {},
  form: { address:'', client:'Allstate', contactName:'', contactPhone:'', claimNumber:'', priority:'medium' }
};

function isFI(client) { return client === 'FI-NC' || client === 'FI-DH'; }

// === JOB TIMER ===
function startJobTimer(jobId) {
  if (!state.contactLog[jobId]) state.contactLog[jobId] = { calls:[], texts:[] };
  state.contactLog[jobId].timerStart = Date.now();
  state.contactLog[jobId].timerEnd = null;
  saveData();
  showToast('⏱ Timer started');
  render();
}

function stopJobTimer(jobId) {
  const log = state.contactLog[jobId];
  if (!log || !log.timerStart) return;
  log.timerEnd = Date.now();
  const elapsed = log.timerEnd - log.timerStart;
  if (!log.totalTimeMs) log.totalTimeMs = 0;
  log.totalTimeMs += elapsed;
  log.timerStart = null;
  saveData();
  showToast(`⏱ ${formatDuration(elapsed)} logged`);
  render();
}

function getTimerStatus(jobId) {
  const log = state.contactLog[jobId];
  if (!log) return { running: false, totalMs: 0 };
  if (log.timerStart) {
    const liveElapsed = Date.now() - log.timerStart;
    return { running: true, totalMs: (log.totalTimeMs || 0) + liveElapsed, liveMs: liveElapsed };
  }
  return { running: false, totalMs: log.totalTimeMs || 0 };
}

function formatDuration(ms) {
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m ${s.toString().padStart(2,'0')}s`;
  return `${s}s`;
}

// === GPS ===
let gpsWatchId = null;
function startGPS() {
  if (gpsWatchId !== null) return;
  if (!navigator.geolocation) return;
  gpsWatchId = navigator.geolocation.watchPosition(
    pos => {
      const firstFix = state.userLat === null;
      state.userLat = pos.coords.latitude;
      state.userLng = pos.coords.longitude;
      const statusEl = document.getElementById('map-status-text');
      if (statusEl) statusEl.innerHTML = `<div class="map-dot"></div><span style="color:var(--green)">LIVE — Location active</span><span style="color:var(--muted);margin-left:auto;">${state.jobs.filter(j=>!state.done.includes(j.id)).length} stops pending</span>`;
      if (state.tab === 'map' && window._youMarker) {
        window._youMarker.setLatLng([state.userLat, state.userLng]);
      } else if (state.tab === 'map' && window._leafletMap && state.userLat) {
        addYouMarker(window._leafletMap);
      }
      // First fix: refresh travel times on the route view
      if (firstFix && state.tab === 'route') {
        refreshAllTravelTimes();
      }
    },
    err => {
      const statusEl = document.getElementById('map-status-text');
      if (statusEl) statusEl.innerHTML = `<div style="width:10px;height:10px;border-radius:50%;background:var(--red);"></div><span style="color:var(--red)">GPS unavailable</span>`;
    },
    { enableHighAccuracy: true, maximumAge: 15000 }
  );
}

// Auto-start GPS once at app launch so travel times can populate
function initLocationServices() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    pos => {
      state.userLat = pos.coords.latitude;
      state.userLng = pos.coords.longitude;
      refreshAllTravelTimes();
    },
    err => {},
    { enableHighAccuracy: true, maximumAge: 60000, timeout: 10000 }
  );
  startGPS();
}

// === TRAVEL TIME ===
// Using haversine + average city speed of 30 mph as a quick estimate.
// More accurate routing would need a paid API; this gets you in the ballpark.
function haversineMiles(lat1, lng1, lat2, lng2) {
  const R = 3958.8;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

// Geocode cache so we don't hammer Nominatim
const geocodeCache = JSON.parse(localStorage.getItem('routepro_geocache') || '{}');
function saveGeocache() {
  try { localStorage.setItem('routepro_geocache', JSON.stringify(geocodeCache)); } catch(e) {}
}

async function geocodeAddress(address) {
  if (geocodeCache[address]) return geocodeCache[address];
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1`);
    const data = await r.json();
    if (data[0]) {
      const coords = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
      geocodeCache[address] = coords;
      saveGeocache();
      return coords;
    }
  } catch(e) {}
  return null;
}

async function refreshAllTravelTimes() {
  if (!state.userLat) return;
  for (const job of state.jobs) {
    if (state.done.includes(job.id)) continue;
    const coords = await geocodeAddress(job.address);
    if (!coords) continue;
    const miles = haversineMiles(state.userLat, state.userLng, coords.lat, coords.lng);
    // 30 mph avg = 2 minutes per mile
    const minutes = Math.max(1, Math.round(miles * 2));
    if (!state.contactLog[job.id]) state.contactLog[job.id] = { calls:[], texts:[] };
    state.contactLog[job.id].travelMin = minutes;
    state.contactLog[job.id].travelMiles = miles;
    // Update just this card's chip without full re-render
    const chip = document.getElementById(`travel-${job.id}`);
    if (chip) chip.innerHTML = `🚗 ${minutes} min · ${miles.toFixed(1)} mi`;
  }
  saveData();
}

// === CONTACT LOGGING ===
function logCall(jobId) {
  if (!state.contactLog[jobId]) state.contactLog[jobId] = { calls:[], texts:[] };
  if (!state.contactLog[jobId].calls) state.contactLog[jobId].calls = [];
  state.contactLog[jobId].calls.push({ time: Date.now() });
  saveData();
}

function logText(jobId, templateKey) {
  if (!state.contactLog[jobId]) state.contactLog[jobId] = { calls:[], texts:[] };
  if (!state.contactLog[jobId].texts) state.contactLog[jobId].texts = [];
  state.contactLog[jobId].texts.push({ time: Date.now(), type: templateKey });
  saveData();
}

function getCallCount(jobId) {
  return (state.contactLog[jobId]?.calls || []).length;
}

function getLastCall(jobId) {
  const calls = state.contactLog[jobId]?.calls || [];
  return calls.length ? calls[calls.length - 1].time : null;
}

function getLastText(jobId) {
  const texts = state.contactLog[jobId]?.texts || [];
  return texts.length ? texts[texts.length - 1].time : null;
}

// Returns true if a call was made and no follow-up text was sent within FOLLOWUP_HOURS
function isFollowupDue(jobId) {
  const lastCall = getLastCall(jobId);
  if (!lastCall) return false;
  const lastText = getLastText(jobId);
  if (lastText && lastText > lastCall) return false; // already followed up
  const hoursSince = (Date.now() - lastCall) / (1000 * 60 * 60);
  return hoursSince >= 0; // show countdown; "due" means visible
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const min = Math.floor(diff / 60000);
  if (min < 1) return 'just now';
  if (min < 60) return min + 'm ago';
  const hr = Math.floor(min / 60);
  if (hr < 24) return hr + 'h ago';
  const day = Math.floor(hr / 24);
  return day + 'd ago';
}

function callJob(jobId) {
  const job = state.jobs.find(j => j.id === jobId);
  if (!job || !job.contactPhone) {
    showToast('No phone number for this job');
    return;
  }
  logCall(jobId);
  showToast(`📞 Calling ${job.contactName} · attempt #${getCallCount(jobId)}`);
  // Trigger the actual phone dialer
  window.location.href = `tel:${job.contactPhone.replace(/\D/g,'')}`;
  // Re-render after a beat so the chip updates
  setTimeout(() => render(), 500);
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function renderJobExtras(job) {
  const log = state.contactLog[job.id] || {};
  const callCount = (log.calls || []).length;
  const lastCall = getLastCall(job.id);
  const lastText = getLastText(job.id);
  const travelMin = log.travelMin;
  const travelMiles = log.travelMiles;

  let chips = [];

  // Travel time chip
  if (travelMin) {
    chips.push(`<span class="extra-chip travel" id="travel-${job.id}">🚗 ${travelMin} min · ${travelMiles.toFixed(1)} mi</span>`);
  } else if (state.userLat) {
    chips.push(`<span class="extra-chip travel" id="travel-${job.id}">🚗 calculating...</span>`);
  } else {
    chips.push(`<span class="extra-chip travel" id="travel-${job.id}" style="opacity:0.5;">🚗 GPS off</span>`);
  }

  // Call attempt chip
  if (callCount > 0) {
    chips.push(`<span class="extra-chip attempts">📞 ${callCount}x · ${timeAgo(lastCall)}</span>`);
  }

  // Last text chip
  if (lastText) {
    chips.push(`<span class="extra-chip last-call">💬 texted ${timeAgo(lastText)}</span>`);
  }

  // Follow-up needed chip
  if (lastCall && (!lastText || lastText < lastCall)) {
    const hoursSince = (Date.now() - lastCall) / (1000 * 60 * 60);
    if (hoursSince < FOLLOWUP_HOURS) {
      chips.push(`<span class="extra-chip followup-due">⚠️ NEEDS FOLLOW-UP TEXT</span>`);
    }
  }

  // Refused warning - 3+ call attempts
  if (callCount >= 3) {
    chips.push(`<span class="extra-chip refused-warn">⛔ ${callCount} ATTEMPTS - SEND LAST TRY</span>`);
  }

  // Timer chip
  const timer = getTimerStatus(job.id);
  if (timer.running) {
    chips.push(`<span class="timer-chip running" id="timer-${job.id}">⏱ ${formatDuration(timer.totalMs)}</span>`);
  } else if (timer.totalMs > 0) {
    chips.push(`<span class="timer-chip done">⏱ ${formatDuration(timer.totalMs)}</span>`);
  }

  return chips.length ? `<div class="job-extra">${chips.join('')}</div>` : '';
}

      <div class="toggle-group" style="margin-bottom:12px;">
        <button class="toggle-btn ${f.client==='FI-NC'?'active-fi':''}" onclick="setClient('FI-NC')">FI — No Contact</button>
        <button class="toggle-btn ${f.client==='FI-DH'?'active-fi':''}" style="${f.client==='FI-DH'?'border-color:#ffd54f;color:#ffd54f;background:#ffd54f22;':''}" onclick="setClient('FI-DH')">FI — Door Hanger</button>
      </div>

      ${isAddFI ? `
        <div class="fi-notice" style="${f.client==='FI-DH'?'border-color:#ffd54f;color:#ffd54f;background:#ffd54f11;':''}">
          ${f.client==='FI-NC' ? '🔍 No Contact — just show up and inspect. No text generated.' : '🟡 Door Hanger — knock, if no answer leave the yellow door hanger. No text generated.'}
        </div>
      ` : `
        <div class="form-label">CONTACT NAME</div>
        <input id="form_contactName" class="form-input" placeholder="Homeowner name" value="${f.contactName}"/>
        <div class="form-label">CONTACT PHONE</div>
        <input id="form_contactPhone" class="form-input" placeholder="8015550100" value="${f.contactPhone}" type="tel"/>
      `}

      <div class="form-label">CLAIM NUMBER</div>
      <input id="form_claimNumber" class="form-input" placeholder="${isAddFI?'FI-2024-0100':'e.g. ALL-2024-0200'}" value="${f.claimNumber}"/>

      <div class="form-label">PRIORITY</div>
      <div class="toggle-group" style="margin-bottom:14px;">
        <button class="toggle-btn ${f.priority==='high'?'active-high':''}" onclick="setPriority('high')">HIGH</button>
        <button class="toggle-btn ${f.priority==='medium'?'active-medium':''}" onclick="setPriority('medium')">MED</button>
        <button class="toggle-btn ${f.priority==='low'?'active-low':''}" onclick="setPriority('low')">LOW</button>
      </div>

      <div style="background:var(--green-dim);border:1px solid #00ff8833;border-radius:8px;padding:10px 12px;margin-bottom:16px;font-size:11px;color:#00ff88;line-height:1.5;">
        ${isAddFI ? '🔍 FIELD INSPECTION · $14.50 fixed rate · No text generated' : '🏠 EXTERIOR SURVEY · $14.50 fixed rate · Auto-generates text template'}
      </div>

      <button class="add-btn" onclick="addJob()">+ ADD INSPECTION</button>
    </div>`;
}

function renderStats(earned, pendingPay, totalPay) {
  const allstateJobs = state.jobs.filter(j => j.client==='Allstate');
  const farmersJobs = state.jobs.filter(j => j.client==='Farmers');
  const fiNCJobs2 = state.jobs.filter(j => j.client==='FI-NC');
  const fiDHJobs2 = state.jobs.filter(j => j.client==='FI-DH');
  const allstateDone = allstateJobs.filter(j => state.done.includes(j.id)).length;
  const farmersDone = farmersJobs.filter(j => state.done.includes(j.id)).length;
  const fiNCDone = fiNCJobs2.filter(j => state.done.includes(j.id)).length;
  const fiDHDone = fiDHJobs2.filter(j => state.done.includes(j.id)).length;
  const pct = state.jobs.length ? Math.round((state.done.length/state.jobs.length)*100) : 0;

  // Contact log totals
  const totalCalls = Object.values(state.contactLog).reduce((s, l) => s + ((l.calls||[]).length), 0);
  const totalTexts = Object.values(state.contactLog).reduce((s, l) => s + ((l.texts||[]).length), 0);
  const needsFollowup = state.jobs.filter(j => {
    const lc = getLastCall(j.id);
    const lt = getLastText(j.id);
    return lc && (!lt || lt < lc) && !state.done.includes(j.id);
  }).length;

  // Time tracking stats - only count finished (non-running) timers
  const timedJobs = state.jobs.filter(j => {
    const log = state.contactLog[j.id];
    return log && log.totalTimeMs > 0 && !log.timerStart;
  });
  const totalTimeMs = timedJobs.reduce((s, j) => s + state.contactLog[j.id].totalTimeMs, 0);
  const avgTimeMs = timedJobs.length ? totalTimeMs / timedJobs.length : 0;
  const totalHours = totalTimeMs / (1000 * 60 * 60);
  const earnedFromTimed = timedJobs.filter(j => state.done.includes(j.id)).reduce((s, j) => s + PAY[j.client], 0);
  const hourlyRate = totalHours > 0 ? (earnedFromTimed / totalHours) : 0;

  return `
    <div class="stats-card">
      <div class="stats-title">EARNINGS TODAY</div>
      <div class="stat-row">
        <div><div class="stat-name">Completed</div><div class="stat-sub">${state.done.length} surveys</div></div>
        <div class="stat-amount" style="color:var(--green)">$${earned.toFixed(2)}</div>
      </div>
      <div class="stat-row">
        <div><div class="stat-name">Pending</div><div class="stat-sub">${state.jobs.length-state.done.length} surveys</div></div>
        <div class="stat-amount" style="color:var(--blue)">$${pendingPay.toFixed(2)}</div>
      </div>
      <div class="divider"></div>
      <div class="stat-row">
        <div style="color:var(--text);font-weight:bold;font-family:'Rajdhani',sans-serif;">Total Day</div>
        <div class="stat-amount" style="color:var(--text);font-size:22px;">$${totalPay.toFixed(2)}</div>
      </div>
    </div>

    <div class="stats-card">
      <div class="stats-title">CONTACT ACTIVITY</div>
      <div class="stat-row">
        <div><div class="stat-name">Calls Made</div><div class="stat-sub">across all jobs</div></div>
        <div class="stat-amount" style="color:var(--green)">${totalCalls}</div>
      </div>
      <div class="stat-row">
        <div><div class="stat-name">Texts Sent</div><div class="stat-sub">across all jobs</div></div>
        <div class="stat-amount" style="color:var(--blue)">${totalTexts}</div>
      </div>
      <div class="stat-row">
        <div><div class="stat-name">Need Follow-Up</div><div class="stat-sub">called but not texted</div></div>
        <div class="stat-amount" style="color:${needsFollowup?'var(--red)':'var(--muted)'}">${needsFollowup}</div>
      </div>
    </div>

    <div class="stats-card">
      <div class="stats-title">TIME TRACKING</div>
      <div class="stat-row">
        <div><div class="stat-name">Jobs Timed</div><div class="stat-sub">${timedJobs.length} of ${state.jobs.length}</div></div>
        <div class="stat-amount" style="color:var(--green)">${timedJobs.length}</div>
      </div>
      <div class="stat-row">
        <div><div class="stat-name">Total Time</div><div class="stat-sub">on-site work</div></div>
        <div class="stat-amount" style="color:var(--blue)">${formatDuration(totalTimeMs)}</div>
      </div>
      <div class="stat-row">
        <div><div class="stat-name">Avg per Job</div><div class="stat-sub">across timed jobs</div></div>
        <div class="stat-amount" style="color:var(--orange)">${timedJobs.length ? formatDuration(avgTimeMs) : '—'}</div>
      </div>
      <div class="divider"></div>
      <div class="stat-row">
        <div style="color:var(--text);font-weight:bold;font-family:'Rajdhani',sans-serif;">Hourly Rate</div>
        <div class="stat-amount" style="color:${hourlyRate>=20?'var(--green)':hourlyRate>=15?'var(--orange)':'var(--red)'};font-size:22px;">$${hourlyRate.toFixed(2)}/hr</div>
      </div>
      ${timedJobs.length === 0 ? `<div style="font-size:10px;color:var(--muted);margin-top:8px;text-align:center;">Tap ▶ START on a job when you arrive to track time</div>` : ''}
    </div>

    <div class="stats-card">
      <div class="stats-title">BY CARRIER</div>
      ${[
        {name:'Allstate', jobs:allstateJobs, done:allstateDone, color:CC.Allstate},
        {name:'Farmers', jobs:farmersJobs, done:farmersDone, color:CC.Farmers},
        {name:'FI — No Contact', jobs:fiNCJobs2, done:fiNCDone, color:CC['FI-NC']},
        {name:'FI — Door Hanger', jobs:fiDHJobs2, done:fiDHDone, color:'#ffd54f'},
      ].map(c => `
        <div style="margin-bottom:14px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
            <span style="color:${c.color};font-weight:bold;font-family:'Rajdhani',sans-serif;">${c.name}</span>
            <span style="color:#86efac;font-size:12px;">${c.done}/${c.jobs.length} · $${(c.jobs.reduce((s,j)=>s+PAY[j.client],0)).toFixed(2)}</span>
          </div>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" style="width:${c.jobs.length?(c.done/c.jobs.length)*100:0}%;background:${c.color};"></div>
          </div>
        </div>`).join('')}
    </div>

    <div class="stats-card">
      <div class="stats-title">OVERALL PROGRESS</div>
      <div class="progress-bar-bg" style="height:12px;">
        <div class="progress-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--green),#86efac);"></div>
      </div>
      <div style="text-align:right;margin-top:6px;color:#86efac;font-size:12px;">${pct}% complete</div>
    </div>`;
}

// Actions
function saveName() {
  const inp = document.getElementById('nameInput');
  if (inp) setState({ name: inp.value || 'Your Name', editName: false });
}

function optimize() {
  const sorted = [...state.jobs].sort((a, b) => {
    if (state.done.includes(a.id)) return 1;
    if (state.done.includes(b.id)) return -1;
    const po = {high:0, medium:1, low:2};
    return po[a.priority] - po[b.priority];
  });
  setState({ jobs: sorted, optimized: true });
}

function fullRoute() {
  const pending = state.jobs.filter(j => !state.done.includes(j.id));
  if (!pending.length) return;
  window.open(`https://www.google.com/maps/dir/${pending.map(j=>encodeURIComponent(j.address)).join('/')}`, '_blank');
}

function openMap(addr) {
  window.open(`https://maps.google.com/maps?q=${encodeURIComponent(addr)}`, '_blank');
}

function openText(id) {
  const job = state.jobs.find(j => j.id === id);
  if (!job || isFI(job.client)) return;
  // Auto-pick the right template based on call history
  const callCount = getCallCount(id);
  let defaultTemplate = 'intro';
  if (callCount >= 3) defaultTemplate = 'lasttry';
  else if (callCount >= 1) defaultTemplate = 'busy';
  state.modal = job;
  state.selectedTemplate = defaultTemplate;
  render();
}

function sendSMS() {
  const j = state.modal;
  if (!j) return;
  const templates = getTemplates(j.client);
  const selected = templates.find(t => t.key === state.selectedTemplate) || templates[0];
  if (!selected) return;
  const msg = selected.build(j, state.name);
  logText(j.id, selected.key);
  window.open(`sms:${j.contactPhone.replace(/\D/g,'')}?body=${encodeURIComponent(msg)}`, '_blank');
  showToast(`💬 Text sent · ${selected.title}`);
  closeModal();
}

function toggleDone(id) {
  // If marking done while timer is running, stop it first
  const log = state.contactLog[id];
  if (!state.done.includes(id) && log && log.timerStart) {
    const elapsed = Date.now() - log.timerStart;
    log.timerEnd = Date.now();
    log.totalTimeMs = (log.totalTimeMs || 0) + elapsed;
    log.timerStart = null;
    showToast(`⏱ ${formatDuration(elapsed)} logged`);
  }
  const done = state.done.includes(id)
    ? state.done.filter(x => x !== id)
    : [...state.done, id];
  state.done = done;
  saveData();
  render();
}

function removeJob(id) {
  state.jobs = state.jobs.filter(j => j.id !== id);
  state.done = state.done.filter(x => x !== id);
  delete state.contactLog[id];
  saveData();
  render();
}

function addYouMarker(map) {
  if (window._youMarker) { window._youMarker.remove(); }
  const youIcon = L.divIcon({
    className: '',
    html: `<div style="background:#ff4444;width:18px;height:18px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 14px #ff4444,0 0 4px #fff;"></div>`,
    iconSize:[18,18], iconAnchor:[9,9]
  });
  window._youMarker = L.marker([state.userLat, state.userLng], {icon:youIcon}).addTo(map)
    .bindPopup('<strong style="font-family:monospace;">📍 YOU ARE HERE</strong>');
}

function setClient(val) {
  syncFormFromDOM();
  state.form.client = val;
  render();
}

function setPriority(val) {
  syncFormFromDOM();
  state.form.priority = val;
  render();
}

function addJob() {
  syncFormFromDOM();
  const f = state.form;
  if (!f.address.trim()) { alert('Please enter an address'); return; }
  if (!isFI(f.client) && !f.contactName.trim()) { alert('Please enter a contact name'); return; }
  const newJob = {
    ...f,
    id: Date.now(),
    claimNumber: f.claimNumber.trim() || `${f.client.slice(0,3).toUpperCase()}-${Date.now()}`
  };
  state.jobs = [...state.jobs, newJob];
  state.form = { address:'', client:'Allstate', contactName:'', contactPhone:'', claimNumber:'', priority:'medium' };
  state.tab = 'route';
  state.optimized = false;
  saveData();
  render();
  // Refresh travel time for the new job
  if (state.userLat) refreshAllTravelTimes();
}

function renderMap() {
  const pending = state.jobs.filter(j => !state.done.includes(j.id));
  const locationStatus = state.userLat
    ? `<div class="map-dot"></div><span style="color:var(--green)">LIVE — Location active</span>`
    : `<div style="width:10px;height:10px;border-radius:50%;background:var(--muted);flex-shrink:0;"></div><span style="color:var(--muted)">Locating you...</span>`;
  return `
    <div class="map-status" id="map-status-text">${locationStatus}
      <span style="color:var(--muted);margin-left:auto;">${pending.length} stops pending</span>
    </div>
    <div id="map-container">
      <div id="leaflet-map" style="width:100%;height:100%;"></div>
    </div>
    <div class="map-legend">
      <div class="legend-item"><div style="width:12px;height:12px;border-radius:50%;background:#ff4444;flex-shrink:0;"></div><span style="color:#fff">YOU</span></div>
      <div class="legend-item"><div style="width:12px;height:12px;border-radius:50%;background:#40c8ff;flex-shrink:0;"></div><span style="color:#40c8ff">Allstate</span></div>
      <div class="legend-item"><div style="width:12px;height:12px;border-radius:50%;background:#ffaa00;flex-shrink:0;"></div><span style="color:#ffaa00">Farmers</span></div>
      <div class="legend-item"><div style="width:12px;height:12px;border-radius:50%;background:#e040fb;flex-shrink:0;"></div><span style="color:#e040fb">FI-NC</span></div>
      <div class="legend-item"><div style="width:12px;height:12px;border-radius:50%;background:#ffd54f;flex-shrink:0;"></div><span style="color:#ffd54f">FI-DH</span></div>
    </div>`;
}

function openMapTab() {
  state.tab = 'map';
  render();
  startGPS();
  setTimeout(() => initLeafletMap(), 300);
}

function initLeafletMap() {
  const mapEl = document.getElementById('leaflet-map');
  if (!mapEl) return;
  if (!window.L) {
    if (!document.getElementById('leaflet-css')) {
      const css = document.createElement('link');
      css.id = 'leaflet-css';
      css.rel = 'stylesheet';
      css.href = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css';
      document.head.appendChild(css);
    }
    if (!document.getElementById('leaflet-js')) {
      const script = document.createElement('script');
      script.id = 'leaflet-js';
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';
      script.onload = () => buildMap();
      document.head.appendChild(script);
    }
  } else {
    buildMap();
  }
}

function buildMap() {
  const mapEl = document.getElementById('leaflet-map');
  if (!mapEl || !window.L) return;
  if (mapEl._leaflet_id) { mapEl._leaflet_id = null; mapEl.innerHTML = ''; }

  const centerLat = state.userLat || 40.7608;
  const centerLng = state.userLng || -111.8910;
  const map = L.map('leaflet-map').setView([centerLat, centerLng], 12);
  window._leafletMap = map;
  window._youMarker = null;

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO', maxZoom: 19
  }).addTo(map);

  const colorsMap = { Allstate:'#40c8ff', Farmers:'#ffaa00', 'FI-NC':'#e040fb', 'FI-DH':'#ffd54f' };

  state.jobs.forEach((job, idx) => {
    const isDone = state.done.includes(job.id);
    const color = isDone ? '#555' : (colorsMap[job.client] || '#00ff88');
    const label = isDone ? '✓' : String(idx+1);
    geocodeAddress(job.address).then(coords => {
      if (!coords) return;
      const icon = L.divIcon({
        className: '',
        html: `<div style="background:${color};color:#000;width:30px;height:30px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:11px;font-family:'Rajdhani',sans-serif;box-shadow:0 2px 8px rgba(0,0,0,0.5);"><span style="transform:rotate(45deg)">${label}</span></div>`,
        iconSize:[30,30], iconAnchor:[15,30]
      });
      const log = state.contactLog[job.id] || {};
      const travelText = log.travelMin ? `<br>🚗 ${log.travelMin} min · ${log.travelMiles.toFixed(1)} mi from you` : '';
      L.marker([coords.lat, coords.lng],{icon}).addTo(map).bindPopup(
        `<div style="font-family:monospace;font-size:12px;min-width:180px;line-height:1.6;">
          <strong style="color:${color}">${job.client}</strong><br>
          ${job.address}<br>
          <span style="color:#888">${job.claimNumber}</span>
          ${job.contactName ? `<br>👤 ${job.contactName}` : ''}
          ${travelText}
          ${isDone ? '<br><span style="color:#00c853">✓ DONE</span>' : ''}
        </div>`
      );
    });
  });

  if (state.userLat) {
    addYouMarker(map);
  }
}

render();
initLocationServices();

// Live timer tick - updates running timer chips every second without full re-render
setInterval(() => {
  state.jobs.forEach(job => {
    const t = getTimerStatus(job.id);
    if (t.running) {
      const chip = document.getElementById(`timer-${job.id}`);
      if (chip) chip.innerHTML = `⏱ ${formatDuration(t.totalMs)}`;
    }
  });
}, 1000);

// Re-render every minute so "time ago" labels stay fresh
setInterval(() => {
  if (state.tab === 'route' || state.tab === 'text') render();
}, 60000);
</script>

</body>
</html>
