<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Field Inspector Route Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&display=swap');

:root {
–bg: #080e14;
–surface: #0d1820;
–surface2: #111f2a;
–green: #00e676;
–green-dim: #00e67622;
–blue: #29b6f6;
–blue-dim: #29b6f622;
–orange: #ff9800;
–orange-dim: #ff980022;
–purple: #ce93d8;
–purple-dim: #ce93d822;
–red: #ef5350;
–red-dim: #ef535022;
–text: #e0f2e9;
–muted: #4a6572;
–border: #1a2f3a;
}

- { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:var(–bg); font-family:‘Share Tech Mono’,monospace; color:var(–text); min-height:100vh; }
  button, input, select, textarea { font-family:‘Share Tech Mono’,monospace; }
  ::-webkit-scrollbar { width:3px; }
  ::-webkit-scrollbar-thumb { background:var(–green-dim); border-radius:2px; }

/* HEADER */
.header {
background: linear-gradient(135deg, #0a1a0e 0%, #0a1624 100%);
border-bottom: 1px solid var(–green);
padding: 16px 16px 12px;
position: sticky; top:0; z-index:100;
box-shadow: 0 4px 20px rgba(0,230,118,0.1);
}
.header-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
.header-label { font-size:9px; letter-spacing:4px; color:var(–green); font-family:‘Rajdhani’,sans-serif; }
.header-title { font-size:22px; font-weight:700; font-family:‘Rajdhani’,sans-serif; letter-spacing:2px; }
.header-right { text-align:right; }
.survey-count { font-size:28px; font-weight:700; color:var(–green); font-family:‘Rajdhani’,sans-serif; line-height:1; }
.survey-rate { font-size:10px; color:var(–green); opacity:0.7; }
.name-row { display:flex; align-items:center; gap:6px; margin-top:2px; }
.name-display { font-size:11px; color:#86efac; cursor:pointer; }
.name-input { background:rgba(0,0,0,0.4); border:1px solid var(–border); border-radius:4px; color:var(–text); font-size:11px; padding:3px 8px; width:160px; outline:none; }

.stats-row { display:flex; gap:8px; }
.stat-box { flex:1; background:rgba(0,0,0,0.3); border-radius:8px; padding:8px 10px; }
.stat-label { font-size:8px; letter-spacing:2px; margin-bottom:2px; }
.stat-value { font-size:14px; font-weight:bold; font-family:‘Rajdhani’,sans-serif; }

/* TABS */
.tabs { display:flex; background:#0a1218; border-bottom:1px solid var(–border); }
.tab { flex:1; padding:10px 4px; background:none; border:none; border-bottom:2px solid transparent; color:var(–muted); font-size:9px; letter-spacing:1px; font-weight:bold; cursor:pointer; transition:all 0.2s; font-family:‘Rajdhani’,sans-serif; }
.tab.active { border-bottom-color:var(–green); color:var(–green); }

/* CONTENT */
.content { padding:14px; max-width:600px; margin:0 auto; }

/* ACTION BUTTONS */
.action-row { display:flex; gap:10px; margin-bottom:14px; }
.action-btn { flex:1; padding:13px; border-radius:10px; border:1px solid; font-size:10px; letter-spacing:2px; font-weight:bold; cursor:pointer; font-family:‘Rajdhani’,sans-serif; transition:all 0.2s; }
.btn-optimize { background:linear-gradient(135deg,#003d1a,#005724); border-color:var(–green); color:var(–green); }
.btn-route { background:linear-gradient(135deg,#0a1a2e,#0d2548); border-color:var(–blue); color:var(–blue); }

/* JOB CARDS */
.job-card { background:var(–surface); border-radius:12px; padding:14px; margin-bottom:10px; border:1px solid var(–border); position:relative; overflow:hidden; transition:opacity 0.3s; }
.job-card.done { opacity:0.4; }
.job-card .side-bar { position:absolute; left:0; top:0; bottom:0; width:3px; }
.job-inner { margin-left:10px; display:flex; justify-content:space-between; gap:8px; }
.job-info { flex:1; }
.job-badges { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:5px; align-items:center; }
.badge { font-size:9px; border-radius:4px; padding:2px 7px; letter-spacing:1px; font-weight:bold; border:1px solid; font-family:‘Rajdhani’,sans-serif; }
.priority-dot { font-size:9px; }
.job-address { font-size:12px; color:var(–text); margin-bottom:2px; }
.job-meta { font-size:10px; color:var(–muted); margin-bottom:2px; }
.job-type { font-size:10px; color:var(–green); opacity:0.6; margin-bottom:4px; }
.job-pay { font-size:16px; font-weight:bold; color:var(–green); font-family:‘Rajdhani’,sans-serif; }
.job-pay.fi-pay { color:var(–purple); }

.job-actions { display:flex; flex-direction:column; gap:5px; }
.jbtn { border-radius:6px; padding:5px 9px; font-size:9px; border:1px solid; cursor:pointer; font-family:‘Rajdhani’,sans-serif; letter-spacing:1px; font-weight:bold; transition:all 0.15s; background:rgba(0,0,0,0.3); white-space:nowrap; }
.jbtn:active { transform:scale(0.95); }

/* FI BADGE */
.fi-only-badge { background:var(–purple-dim); border:1px solid var(–purple); color:var(–purple); font-size:9px; border-radius:4px; padding:2px 7px; letter-spacing:1px; font-family:‘Rajdhani’,sans-serif; }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:999; display:flex; align-items:center; justify-content:center; padding:20px; }
.modal { background:#0a1a14; border:1px solid var(–green); border-radius:16px; padding:22px; max-width:380px; width:100%; }
.modal-label { font-size:9px; letter-spacing:3px; color:var(–green); margin-bottom:4px; font-family:‘Rajdhani’,sans-serif; }
.modal-name { font-size:16px; font-weight:bold; font-family:‘Rajdhani’,sans-serif; }
.modal-sub { font-size:11px; margin-bottom:14px; }
.msg-preview { background:rgba(255,255,255,0.04); border-radius:10px; padding:12px; font-size:12px; color:#d1fae5; line-height:1.7; margin-bottom:16px; border:1px solid var(–border); }
.modal-btns { display:flex; gap:10px; }
.modal-cancel { flex:1; padding:11px; border-radius:8px; background:var(–red-dim); border:1px solid var(–red); color:var(–red); cursor:pointer; font-size:11px; letter-spacing:2px; font-family:‘Rajdhani’,sans-serif; font-weight:bold; }
.modal-send { flex:2; padding:11px; border-radius:8px; background:linear-gradient(135deg,#003d1a,#005724); border:1px solid var(–green); color:var(–green); cursor:pointer; font-size:11px; letter-spacing:2px; font-family:‘Rajdhani’,sans-serif; font-weight:bold; }

/* FORM */
.form-card { background:var(–surface); border:1px solid var(–green-dim); border-radius:12px; padding:20px; }
.form-label { font-size:9px; letter-spacing:2px; color:#86efac; margin-bottom:5px; font-family:‘Rajdhani’,sans-serif; }
.form-input { width:100%; padding:10px 12px; background:rgba(0,0,0,0.4); border:1px solid var(–border); border-radius:6px; color:var(–text); font-size:13px; outline:none; margin-bottom:12px; font-family:‘Share Tech Mono’,monospace; }
.form-input:focus { border-color:var(–green); }
.toggle-group { display:flex; gap:8px; margin-bottom:12px; }
.toggle-btn { flex:1; padding:10px; border-radius:6px; border:1px solid var(–border); background:rgba(0,0,0,0.3); color:var(–muted); cursor:pointer; font-size:11px; font-weight:bold; font-family:‘Rajdhani’,sans-serif; letter-spacing:1px; transition:all 0.2s; }
.toggle-btn.active-allstate { background:var(–blue-dim); border-color:var(–blue); color:var(–blue); }
.toggle-btn.active-farmers { background:var(–orange-dim); border-color:var(–orange); color:var(–orange); }
.toggle-btn.active-fi { background:var(–purple-dim); border-color:var(–purple); color:var(–purple); }
.toggle-btn.active-high { background:rgba(239,83,80,0.15); border-color:var(–red); color:var(–red); }
.toggle-btn.active-medium { background:var(–orange-dim); border-color:var(–orange); color:var(–orange); }
.toggle-btn.active-low { background:rgba(74,101,114,0.2); border-color:var(–muted); color:var(–muted); }
.fi-notice { background:var(–purple-dim); border:1px solid var(–purple); border-radius:8px; padding:10px 12px; font-size:11px; color:var(–purple); margin-bottom:12px; line-height:1.5; }
.add-btn { width:100%; padding:14px; border-radius:10px; background:linear-gradient(135deg,#003d1a,#005724); border:1px solid var(–green); color:var(–green); font-size:13px; letter-spacing:3px; font-weight:bold; cursor:pointer; font-family:‘Rajdhani’,sans-serif; box-shadow:0 0 16px rgba(0,230,118,0.2); }

/* STATS */
.stats-card { background:var(–surface); border:1px solid var(–green-dim); border-radius:12px; padding:20px; margin-bottom:12px; }
.stats-title { font-size:10px; letter-spacing:3px; color:var(–green); margin-bottom:16px; font-family:‘Rajdhani’,sans-serif; }
.stat-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.stat-name { color:#86efac; font-size:13px; }
.stat-sub { font-size:10px; color:var(–muted); }
.stat-amount { font-weight:bold; font-size:18px; font-family:‘Rajdhani’,sans-serif; }
.divider { height:1px; background:var(–border); margin:10px 0; }
.progress-bar-bg { background:var(–border); border-radius:100px; height:7px; overflow:hidden; margin-top:5px; }
.progress-bar-fill { height:100%; border-radius:100px; transition:width 0.5s; }

/* TEXT TAB */
.carrier-section { background:var(–surface); border-radius:12px; padding:16px; margin-bottom:12px; }
.carrier-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.carrier-name { font-size:16px; font-weight:bold; font-family:‘Rajdhani’,sans-serif; }
.carrier-tag { font-size:9px; border-radius:5px; padding:3px 10px; border:1px solid; font-family:‘Rajdhani’,sans-serif; }
.text-job-row { display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.3); border-radius:8px; padding:10px 12px; border:1px solid var(–border); margin-bottom:8px; }
.text-job-name { font-size:12px; }
.text-job-addr { font-size:10px; color:var(–muted); }
.text-send-btn { border-radius:6px; padding:7px 12px; font-size:10px; border:1px solid; cursor:pointer; font-family:‘Rajdhani’,sans-serif; font-weight:bold; letter-spacing:1px; }
.fi-section { background:var(–surface); border-radius:12px; padding:16px; margin-bottom:12px; border:1px solid var(–purple-dim); }
.fi-job-row { background:rgba(0,0,0,0.3); border-radius:8px; padding:10px 12px; border:1px solid var(–purple-dim); margin-bottom:8px; }
.fi-no-contact { font-size:10px; color:var(–purple); margin-top:3px; }

.empty-msg { text-align:center; color:var(–muted); font-size:12px; padding:12px; }

.section-header { font-size:10px; letter-spacing:3px; color:var(–green); margin-bottom:12px; font-family:‘Rajdhani’,sans-serif; }
</style>

</head>
<body>

<div id="app"></div>

<script>
const PAY = { Allstate: 14.50, Farmers: 14.50, 'FI-NC': 14.50, 'FI-DH': 14.50 };
const CC = { Allstate: '#29b6f6', Farmers: '#ff9800', 'FI-NC': '#ce93d8', 'FI-DH': '#ffd54f' };
const CLIENT_LABELS = { Allstate: 'Allstate', Farmers: 'Farmers', 'FI-NC': 'FI — No Contact', 'FI-DH': 'FI — Door Hanger' };

const TEMPLATES = {
  Allstate: (j, n) => `Hi ${j.contactName}, this is ${n} with Allstate Insurance field services. I am scheduled to conduct an exterior survey of your property at ${j.address} for claim #${j.claimNumber}. This is an EXTERIOR ONLY inspection — no interior access needed. I will be visiting shortly. Questions? Reply here. Thank you!`,
  Farmers: (j, n) => `Hi ${j.contactName}, this is ${n} with Farmers Insurance field services. I am assigned to complete an exterior property survey at ${j.address} for claim #${j.claimNumber}. This is an EXTERIOR inspection only — you do not need to be home. I will be by shortly. Questions? Reply here. Thank you!`,
};

let state = {
  jobs: [
    { id:1, address:"1234 W 4700 S, Taylorsville, UT", client:"Allstate", contactName:"John Smith", contactPhone:"8015550101", priority:"high", claimNumber:"ALL-2024-0091" },
    { id:2, address:"892 E 3300 S, Salt Lake City, UT", client:"Farmers", contactName:"Maria Lopez", contactPhone:"8015550182", priority:"high", claimNumber:"FRM-2024-0342" },
    { id:3, address:"3401 S 900 W, South Salt Lake, UT", client:"FI-NC", contactName:"", contactPhone:"", priority:"medium", claimNumber:"FI-2024-0055" },
    { id:4, address:"5620 S Redwood Rd, Murray, UT", client:"Farmers", contactName:"Tanya Brooks", contactPhone:"8015550374", priority:"medium", claimNumber:"FRM-2024-0388" },
    { id:5, address:"410 E 12300 S, Draper, UT", client:"FI-DH", contactName:"", contactPhone:"", priority:"low", claimNumber:"FI-2024-0061" },
    { id:6, address:"2245 W 7800 S, West Jordan, UT", client:"Allstate", contactName:"Sandra Lee", contactPhone:"8015550556", priority:"medium", claimNumber:"ALL-2024-0117" },
  ],
  done: [],
  tab: 'route',
  name: 'Your Name',
  editName: false,
  modal: null,
  optimized: false,
  newJob: { address:'', client:'Allstate', contactName:'', contactPhone:'', claimNumber:'', priority:'medium' }
};

function isFI(client) { return client === 'FI-NC' || client === 'FI-DH'; }

function setState(updates) {
  Object.assign(state, updates);
  render();
}

function render() {
  const app = document.getElementById('app');
  const pending = state.jobs.filter(j => !state.done.includes(j.id));
  const completed = state.jobs.filter(j => state.done.includes(j.id));
  const earned = completed.reduce((s, j) => s + PAY[j.client], 0);
  const pendingPay = pending.reduce((s, j) => s + PAY[j.client], 0);
  const totalPay = state.jobs.reduce((s, j) => s + PAY[j.client], 0);

  app.innerHTML = `
    ${state.modal ? renderModal() : ''}
    <div class="header">
      <div class="header-top">
        <div>
          <div class="header-label">FIELD INSPECTOR</div>
          <div class="header-title">ROUTE PRO</div>
          <div class="name-row">
            ${state.editName
              ? `<input class="name-input" id="nameInput" value="${state.name}" onblur="saveName()" onkeydown="if(event.key==='Enter')saveName()" autofocus/>`
              : `<span class="name-display" onclick="setState({editName:true})">✏️ ${state.name}</span>`
            }
          </div>
        </div>
        <div class="header-right">
          <div style="font-size:10px;color:#86efac;font-family:'Rajdhani',sans-serif;">SURVEYS</div>
          <div class="survey-count">${state.jobs.length}</div>
          <div class="survey-rate" style="font-size:9px;color:#86efac;">mixed rates</div>
        </div>
      </div>
      <div class="stats-row">
        <div class="stat-box" style="border:1px solid #00e67633;">
          <div class="stat-label" style="color:var(--green);">EARNED</div>
          <div class="stat-value" style="color:var(--green);">$${earned.toFixed(2)}</div>
        </div>
        <div class="stat-box" style="border:1px solid #29b6f633;">
          <div class="stat-label" style="color:var(--blue);">PENDING</div>
          <div class="stat-value" style="color:var(--blue);">$${pendingPay.toFixed(2)}</div>
        </div>
        <div class="stat-box" style="border:1px solid #ff980033;">
          <div class="stat-label" style="color:var(--orange);">DONE</div>
          <div class="stat-value" style="color:var(--orange);">${state.done.length}/${state.jobs.length}</div>
        </div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab ${state.tab==='route'?'active':''}" onclick="setState({tab:'route'})">🗺 ROUTE</button>
      <button class="tab ${state.tab==='text'?'active':''}" onclick="setState({tab:'text'})">📱 TEXTS</button>
      <button class="tab ${state.tab==='add'?'active':''}" onclick="setState({tab:'add'})">➕ ADD</button>
      <button class="tab ${state.tab==='stats'?'active':''}" onclick="setState({tab:'stats'})">📊 STATS</button>
    </div>

    <div class="content">
      ${state.tab==='route' ? renderRoute() : ''}
      ${state.tab==='text' ? renderText() : ''}
      ${state.tab==='add' ? renderAdd() : ''}
      ${state.tab==='stats' ? renderStats(earned, pendingPay, totalPay) : ''}
    </div>
  `;

  if (state.editName) {
    const inp = document.getElementById('nameInput');
    if (inp) inp.focus();
  }
}

function renderModal() {
  const j = state.modal;
  const msg = TEMPLATES[j.client] ? TEMPLATES[j.client](j, state.name) : '';
  return `
    <div class="modal-overlay" onclick="setState({modal:null})">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-label">PREVIEW TEXT MESSAGE</div>
        <div class="modal-name">${j.contactName}</div>
        <div class="modal-sub" style="color:${CC[j.client]}">${j.client} · ${j.contactPhone}</div>
        <div class="msg-preview">${msg}</div>
        <div class="modal-btns">
          <button class="modal-cancel" onclick="setState({modal:null})">CANCEL</button>
          <button class="modal-send" onclick="sendSMS()">📱 SEND TEXT</button>
        </div>
      </div>
    </div>`;
}

function renderRoute() {
  return `
    <div class="action-row">
      <button class="action-btn btn-optimize" onclick="optimize()">
        ${state.optimized ? '✓ OPTIMIZED' : '⚡ OPTIMIZE'}
      </button>
      <button class="action-btn btn-route" onclick="fullRoute()">🧭 FULL ROUTE</button>
    </div>
    ${state.jobs.map((job, idx) => {
      const d = state.done.includes(job.id);
      const c = CC[job.client];
      const isFIJob = isFI(job.client);
      const priorityColor = job.priority==='high' ? '#ef5350' : job.priority==='medium' ? '#ff9800' : '#4a6572';
      const priorityLabel = job.priority==='high' ? '● HIGH' : job.priority==='medium' ? '● MED' : '○ LOW';
      return `
        <div class="job-card ${d?'done':''}">
          <div class="side-bar" style="background:${d?'#1a2f3a':c}"></div>
          <div class="job-inner">
            <div class="job-info">
              <div class="job-badges">
                <span class="badge" style="background:${c}22;color:${c};border-color:${c}">${CLIENT_LABELS[job.client]}</span>
                <span class="priority-dot" style="color:${priorityColor};font-size:9px;">${priorityLabel}</span>
                ${job.client==='FI-NC' ? '<span class="fi-only-badge">NO CONTACT</span>' : ''}
                ${job.client==='FI-DH' ? `<span style="background:#ffd54f22;border:1px solid #ffd54f;color:#ffd54f;font-size:9px;border-radius:4px;padding:2px 7px;letter-spacing:1px;font-family:'Rajdhani',sans-serif;font-weight:bold;">🟡 DOOR HANGER</span>` : ''}
              </div>
              <div class="job-address">#${String(idx+1).padStart(2,'0')} — ${job.address}</div>
              <div class="job-meta">${job.claimNumber}${!isFIJob ? ' · '+job.contactName : ''}</div>
              <div class="job-type">${job.client==='FI-NC' ? '🔍 NO CONTACT — INSPECT & LEAVE' : job.client==='FI-DH' ? '🟡 KNOCK & LEAVE DOOR HANGER' : '🏠 EXTERIOR ONLY'}</div>
              <div class="job-pay ${isFIJob?'fi-pay':''}">$${PAY[job.client].toFixed(2)}</div>
            </div>
            <div class="job-actions">
              <button class="jbtn" style="color:var(--blue);border-color:#29b6f644;" onclick="openMap('${job.address}')">📍 MAP</button>
              ${!isFIJob ? `<button class="jbtn" style="color:${c};border-color:${c}44;" onclick="openText(${job.id})">📱 TEXT</button>` : `<button class="jbtn" style="color:var(--muted);border-color:#1a2f3a;opacity:0.4;cursor:default;">NO TEXT</button>`}
              <button class="jbtn" style="color:${d?'var(--green)':'var(--muted)'};border-color:${d?'#00e67644':'#1a2f3a'};" onclick="toggleDone(${job.id})">${d?'✓ DONE':'○ DONE'}</button>
              <button class="jbtn" style="color:var(--red);border-color:#ef535044;" onclick="removeJob(${job.id})">✕</button>
            </div>
          </div>
        </div>`;
    }).join('')}`;
}

function renderText() {
  const carriers = ['Allstate', 'Farmers'];
  let html = `<div class="section-header">TEXT CLIENTS BY CARRIER</div>`;

  carriers.forEach(client => {
    const c = CC[client];
    const cjobs = state.jobs.filter(j => j.client===client && !state.done.includes(j.id));
    html += `
      <div class="carrier-section" style="border:1px solid ${c}22;">
        <div class="carrier-header">
          <div>
            <div class="carrier-name" style="color:${c}">${client}</div>
            <div style="font-size:11px;color:var(--muted)">${cjobs.length} pending · exterior surveys</div>
          </div>
          <span class="carrier-tag" style="color:${c};border-color:${c}">EXTERIOR ONLY</span>
        </div>
        ${cjobs.length===0
          ? `<div class="empty-msg">All ${client} surveys complete ✓</div>`
          : cjobs.map(job => `
            <div class="text-job-row">
              <div>
                <div class="text-job-name">${job.contactName}</div>
                <div class="text-job-addr">${job.address.split(',')[0]}</div>
                <div class="text-job-addr">${job.claimNumber}</div>
              </div>
              <button class="text-send-btn" style="background:${c}22;color:${c};border-color:${c}" onclick="openText(${job.id})">📱 TEXT</button>
            </div>`).join('')
        }
      </div>`;
  });

  // FI No Contact section
  const fiNCJobs = state.jobs.filter(j => j.client==='FI-NC' && !state.done.includes(j.id));
  html += `
    <div class="fi-section">
      <div class="carrier-header">
        <div>
          <div class="carrier-name" style="color:var(--purple)">FI — No Contact</div>
          <div style="font-size:11px;color:var(--muted)">${fiNCJobs.length} pending · no contact needed</div>
        </div>
        <span class="carrier-tag" style="color:var(--purple);border-color:var(--purple)">SHOW UP ONLY</span>
      </div>
      ${fiNCJobs.length===0
        ? `<div class="empty-msg">All FI No Contact inspections complete ✓</div>`
        : fiNCJobs.map(job => `
          <div class="fi-job-row">
            <div class="text-job-name" style="color:var(--text)">${job.address}</div>
            <div class="text-job-addr">${job.claimNumber}</div>
            <div class="fi-no-contact">🔍 Just show up — no knock, no text</div>
          </div>`).join('')
      }
    </div>`;

  // FI Door Hanger section
  const fiDHJobs = state.jobs.filter(j => j.client==='FI-DH' && !state.done.includes(j.id));
  html += `
    <div class="fi-section" style="border-color:#ffd54f33;">
      <div class="carrier-header">
        <div>
          <div class="carrier-name" style="color:#ffd54f">FI — Door Hanger</div>
          <div style="font-size:11px;color:var(--muted)">${fiDHJobs.length} pending · knock & leave hanger</div>
        </div>
        <span class="carrier-tag" style="color:#ffd54f;border-color:#ffd54f">DOOR HANGER</span>
      </div>
      ${fiDHJobs.length===0
        ? `<div class="empty-msg">All FI Door Hanger inspections complete ✓</div>`
        : fiDHJobs.map(job => `
          <div class="fi-job-row" style="border-color:#ffd54f22;">
            <div class="text-job-name" style="color:var(--text)">${job.address}</div>
            <div class="text-job-addr">${job.claimNumber}</div>
            <div class="fi-no-contact" style="color:#ffd54f;">🟡 Knock — if no answer, leave yellow door hanger</div>
          </div>`).join('')
      }
    </div>`;

  return html;
}

function renderAdd() {
  const nj = state.newJob;
  const isFI = nj.client === 'FI';
  return `
    <div class="form-card">
      <div style="font-size:12px;letter-spacing:3px;color:var(--green);margin-bottom:18px;font-family:'Rajdhani',sans-serif;font-weight:bold;">NEW INSPECTION ORDER</div>

      <div class="form-label">PROPERTY ADDRESS</div>
      <input class="form-input" placeholder="123 Main St, Salt Lake City, UT" value="${nj.address}" oninput="updateNew('address',this.value)"/>

      <div class="form-label">CARRIER</div>
      <div class="toggle-group" style="margin-bottom:4px;">
        <button class="toggle-btn ${nj.client==='Allstate'?'active-allstate':''}" onclick="updateNew('client','Allstate')">Allstate</button>
        <button class="toggle-btn ${nj.client==='Farmers'?'active-farmers':''}" onclick="updateNew('client','Farmers')">Farmers</button>
      </div>
      <div class="toggle-group" style="margin-bottom:12px;">
        <button class="toggle-btn ${nj.client==='FI-NC'?'active-fi':''}" onclick="updateNew('client','FI-NC')">FI — No Contact</button>
        <button class="toggle-btn ${nj.client==='FI-DH'?'':''}${nj.client==='FI-DH'?'border:1px solid #ffd54f;color:#ffd54f;background:#ffd54f22;':''}" style="${nj.client==='FI-DH'?'border-color:#ffd54f;color:#ffd54f;background:#ffd54f22;':''}" onclick="updateNew('client','FI-DH')">FI — Door Hanger</button>
      </div>

      ${isFI(nj.client) ? `
        <div class="fi-notice" style="${nj.client==='FI-DH'?'border-color:#ffd54f;color:#ffd54f;background:#ffd54f11;':''}">
          ${nj.client==='FI-NC' ? '🔍 No Contact FI — just show up and inspect. No text generated.' : '🟡 Door Hanger FI — knock on door, if no answer leave the yellow door hanger. No text generated.'}
        </div>
      ` : `
        <div class="form-label">CONTACT NAME</div>
        <input class="form-input" placeholder="Homeowner name" value="${nj.contactName}" oninput="updateNew('contactName',this.value)"/>
        <div class="form-label">CONTACT PHONE</div>
        <input class="form-input" placeholder="8015550100" value="${nj.contactPhone}" oninput="updateNew('contactPhone',this.value)"/>
      `}

      <div class="form-label">CLAIM NUMBER</div>
      <input class="form-input" placeholder="${isFI(nj.client)?'FI-2024-0100':'e.g. ALL-2024-0200'}" value="${nj.claimNumber}" oninput="updateNew('claimNumber',this.value)"/>

      <div class="form-label">PRIORITY</div>
      <div class="toggle-group">
        <button class="toggle-btn ${nj.priority==='high'?'active-high':''}" onclick="updateNew('priority','high')">HIGH</button>
        <button class="toggle-btn ${nj.priority==='medium'?'active-medium':''}" onclick="updateNew('priority','medium')">MED</button>
        <button class="toggle-btn ${nj.priority==='low'?'active-low':''}" onclick="updateNew('priority','low')">LOW</button>
      </div>

      <div style="background:var(--green-dim);border:1px solid #00e67633;border-radius:8px;padding:10px 12px;margin-bottom:16px;font-size:11px;color:#86efac;line-height:1.5;">
        ${isFI(nj.client) ? '🔍 FIELD INSPECTION · $14.50 fixed rate · No text generated' : '🏠 EXTERIOR SURVEY · $14.50 fixed rate · Auto-generates text template'}
      </div>

      <button class="add-btn" onclick="addJob()">+ ADD INSPECTION</button>
    </div>`;
}

function renderStats(earned, pendingPay, totalPay) {
  const allstateJobs = state.jobs.filter(j => j.client==='Allstate');
  const farmersJobs = state.jobs.filter(j => j.client==='Farmers');
  const fiNCJobs2 = state.jobs.filter(j => j.client==='FI-NC');
  const fiDHJobs2 = state.jobs.filter(j => j.client==='FI-DH');
  const allstateDone = allstateJobs.filter(j => state.done.includes(j.id)).length;
  const farmersDone = farmersJobs.filter(j => state.done.includes(j.id)).length;
  const fiNCDone = fiNCJobs2.filter(j => state.done.includes(j.id)).length;
  const fiDHDone = fiDHJobs2.filter(j => state.done.includes(j.id)).length;
  const pct = state.jobs.length ? Math.round((state.done.length/state.jobs.length)*100) : 0;

  return `
    <div class="stats-card">
      <div class="stats-title">EARNINGS TODAY</div>
      <div class="stat-row">
        <div><div class="stat-name">Completed</div><div class="stat-sub">${state.done.length} surveys</div></div>
        <div class="stat-amount" style="color:var(--green)">$${earned.toFixed(2)}</div>
      </div>
      <div class="stat-row">
        <div><div class="stat-name">Pending</div><div class="stat-sub">${state.jobs.length-state.done.length} surveys</div></div>
        <div class="stat-amount" style="color:var(--blue)">$${pendingPay.toFixed(2)}</div>
      </div>
      <div class="divider"></div>
      <div class="stat-row">
        <div style="color:var(--text);font-weight:bold;font-family:'Rajdhani',sans-serif;">Total Day</div>
        <div class="stat-amount" style="color:var(--text);font-size:22px;">$${totalPay.toFixed(2)}</div>
      </div>
    </div>

    <div class="stats-card">
      <div class="stats-title">BY CARRIER</div>
      ${[
        {name:'Allstate', jobs:allstateJobs, done:allstateDone, color:CC.Allstate},
        {name:'Farmers', jobs:farmersJobs, done:farmersDone, color:CC.Farmers},
        {name:'FI — No Contact', jobs:fiNCJobs2, done:fiNCDone, color:CC['FI-NC']},
        {name:'FI — Door Hanger', jobs:fiDHJobs2, done:fiDHDone, color:'#ffd54f'},
      ].map(c => `
        <div style="margin-bottom:14px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
            <span style="color:${c.color};font-weight:bold;font-family:'Rajdhani',sans-serif;">${c.name}</span>
            <span style="color:#86efac;font-size:12px;">${c.done}/${c.jobs.length} · $${(c.jobs.reduce((s,j)=>s+PAY[j.client],0)).toFixed(2)}</span>
          </div>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" style="width:${c.jobs.length?(c.done/c.jobs.length)*100:0}%;background:${c.color};"></div>
          </div>
        </div>`).join('')}
    </div>

    <div class="stats-card">
      <div class="stats-title">OVERALL PROGRESS</div>
      <div class="progress-bar-bg" style="height:12px;">
        <div class="progress-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--green),#86efac);"></div>
      </div>
      <div style="text-align:right;margin-top:6px;color:#86efac;font-size:12px;">${pct}% complete</div>
    </div>`;
}

// Actions
function saveName() {
  const inp = document.getElementById('nameInput');
  if (inp) setState({ name: inp.value || 'Your Name', editName: false });
}

function optimize() {
  const sorted = [...state.jobs].sort((a, b) => {
    if (state.done.includes(a.id)) return 1;
    if (state.done.includes(b.id)) return -1;
    const po = {high:0, medium:1, low:2};
    return po[a.priority] - po[b.priority];
  });
  setState({ jobs: sorted, optimized: true });
}

function fullRoute() {
  const pending = state.jobs.filter(j => !state.done.includes(j.id));
  if (!pending.length) return;
  window.open(`https://www.google.com/maps/dir/${pending.map(j=>encodeURIComponent(j.address)).join('/')}`, '_blank');
}

function openMap(addr) {
  window.open(`https://maps.google.com/maps?q=${encodeURIComponent(addr)}`, '_blank');
}

function openText(id) {
  const job = state.jobs.find(j => j.id === id);
  if (job && job.client !== 'FI') setState({ modal: job });
}

function sendSMS() {
  const j = state.modal;
  if (!j) return;
  const msg = TEMPLATES[j.client](j, state.name);
  window.open(`sms:${j.contactPhone.replace(/\D/g,'')}?body=${encodeURIComponent(msg)}`, '_blank');
  setState({ modal: null });
}

function toggleDone(id) {
  const done = state.done.includes(id)
    ? state.done.filter(x => x !== id)
    : [...state.done, id];
  setState({ done });
}

function removeJob(id) {
  setState({
    jobs: state.jobs.filter(j => j.id !== id),
    done: state.done.filter(x => x !== id)
  });
}

function updateNew(key, val) {
  setState({ newJob: { ...state.newJob, [key]: val } });
}

function addJob() {
  const nj = state.newJob;
  if (!nj.address) return;
  if (!isFI(nj.client) && !nj.contactName) return;
  const newJob = {
    ...nj,
    id: Date.now(),
    claimNumber: nj.claimNumber || `${nj.client.slice(0,3).toUpperCase()}-${Date.now()}`
  };
  setState({
    jobs: [...state.jobs, newJob],
    newJob: { address:'', client:'Allstate', contactName:'', contactPhone:'', claimNumber:'', priority:'medium' },
    tab: 'route',
    optimized: false
  });
}

render();
</script>

</body>
</html>
