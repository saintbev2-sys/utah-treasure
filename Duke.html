<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<title>Duke Nukem: Crypto Carnage</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    font-family: 'Courier New', monospace;
    color: #00ff41;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  canvas { border: 3px solid #ff6600; box-shadow: 0 0 30px #ff6600; image-rendering: pixelated; }
  #hud {
    width: 640px; background: #111; border: 2px solid #ff6600; border-top: none;
    padding: 6px 12px; display: flex; justify-content: space-between;
    font-size: 13px; color: #ffaa00; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;
  }
  #title-bar {
    width: 640px; background: linear-gradient(90deg, #1a0000, #330000, #1a0000);
    border: 2px solid #ff6600; border-bottom: none; padding: 6px 12px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 16px; color: #ff6600; font-weight: bold; letter-spacing: 3px; text-shadow: 0 0 10px #ff6600;
  }
  #quote { color: #aaa; font-size: 10px; font-style: italic; }
  #controls { width: 640px; background: #0a0a0a; padding: 4px 12px; font-size: 10px; color: #555; display: flex; gap: 16px; }
  .key { color: #ff6600; }
</style>
</head>
<body>
<div id="title-bar">
  <span>&#9762; DUKE NUKEM: CRYPTO CARNAGE &#9762;</span>
  <span id="quote">"IT'S TIME TO MINE AND CHEW BUBBLEGUM"</span>
</div>
<canvas id="canvas" width="640" height="400"></canvas>
<div id="hud">
  <span>&#10084; HP: <span id="hp">100</span></span>
  <span>&#128176; COINS: <span id="coins">0</span></span>
  <span>&#9935; HASH: <span id="hashrate">0</span> H/s</span>
  <span>&#128139; SCORE: <span id="score">0</span></span>
  <span>&#129689; $DUKE: <span id="balance">0.000000</span></span>
</div>
<div id="controls">
  <span><span class="key">A/D</span> MOVE</span>
  <span><span class="key">SPACE</span> JUMP</span>
  <span><span class="key">CLICK</span> SHOOT</span>
  <span><span class="key">E</span> MINE NODE</span>
  <span><span class="key">R</span> RESTART</span>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = 640, H = 400;

let state = { hp: 100, coins: 0, balance: 0, hashrate: 0, score: 0, gameOver: false };
let duke = { x: 80, y: 300, w: 36, h: 54, vx: 0, vy: 0, onGround: false, facing: 1, shooting: false, shootTimer: 0, mining: false, mineTimer: 0 };
let bullets = [], enemies = [], particles = [], floatingTexts = [];

const platforms = [
  { x: 0, y: 370, w: 640, h: 30 },
  { x: 80, y: 290, w: 120, h: 12 },
  { x: 280, y: 240, w: 100, h: 12 },
  { x: 450, y: 200, w: 130, h: 12 },
  { x: 160, y: 170, w: 90, h: 12 },
  { x: 340, y: 310, w: 80, h: 12 },
  { x: 520, y: 290, w: 80, h: 12 },
];

let miningNodes = [
  { x: 110, y: 258, active: true, cooldown: 0, glow: 0 },
  { x: 320, y: 205, active: true, cooldown: 0, glow: 0 },
  { x: 490, y: 165, active: true, cooldown: 0, glow: 0 },
  { x: 200, y: 138, active: true, cooldown: 0, glow: 0 },
  { x: 365, y: 275, active: true, cooldown: 0, glow: 0 },
];

const dukeQuotes = [
  "Hail to the king, baby!",
  "Eat lead, crypto nerd!",
  "I'm here to mine and kick ass.",
  "Come get some... coins!",
  "Nobody steals MY blockchain!",
  "Damn, I'm good.",
  "To the moon — with lead!",
];
let quoteTimer = 300;

let enemySpawnTimer = 180;
let bgStars = Array.from({length:60},()=>({x:Math.random()*W,y:Math.random()*H*0.6,s:Math.random()*2+0.5,t:Math.random()*60}));

const keys = {};
document.addEventListener('keydown', e => { keys[e.code]=true; if(e.code==='Space')e.preventDefault(); if(e.code==='KeyR')resetGame(); });
document.addEventListener('keyup', e => keys[e.code]=false);
canvas.addEventListener('click', e => {
  if(state.gameOver)return;
  const r=canvas.getBoundingClientRect();
  shoot(e.clientX-r.left, e.clientY-r.top);
});

function shoot(tx,ty) {
  const bx=duke.x+duke.w/2,by=duke.y+duke.h/2;
  const dx=tx-bx,dy=ty-by,len=Math.sqrt(dx*dx+dy*dy);
  bullets.push({x:bx,y:by,vx:(dx/len)*12,vy:(dy/len)*12,life:40});
  duke.facing=dx>0?1:-1; duke.shooting=true; duke.shootTimer=8;
}

function resetGame() {
  state={hp:100,coins:0,balance:0,hashrate:0,score:0,gameOver:false};
  duke={x:80,y:300,w:36,h:54,vx:0,vy:0,onGround:false,facing:1,shooting:false,shootTimer:0,mining:false,mineTimer:0};
  bullets=[];enemies=[];particles=[];floatingTexts=[];
  miningNodes.forEach(n=>{n.active=true;n.cooldown=0;n.glow=0;});
  enemySpawnTimer=180;
}

function collide(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

function resolveVsPlats(obj){
  obj.onGround=false;
  for(const p of platforms){
    if(obj.x+obj.w>p.x&&obj.x<p.x+p.w){
      if(obj.y+obj.h>p.y&&obj.y+obj.h<p.y+p.h+12&&obj.vy>=0){
        obj.y=p.y-obj.h;obj.vy=0;obj.onGround=true;
      }
    }
  }
  if(obj.x<0){obj.x=0;obj.vx=0;}
  if(obj.x+obj.w>W){obj.x=W-obj.w;obj.vx=0;}
}

function spawnParticles(x,y,color,n=8){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=Math.random()*4+1;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:30+Math.random()*20,color});
  }
}

function addFloat(x,y,text,color='#ffff00'){floatingTexts.push({x,y,text,color,life:60,vy:-1});}

function spawnEnemy(){
  const side=Math.random()<0.5?40:W-40;
  enemies.push({x:side,y:316,w:30,h:44,vx:side<W/2?1.2:-1.2,vy:0,hp:3,frame:0,ft:0,onGround:false});
}

function update(){
  if(state.gameOver)return;
  quoteTimer--;
  if(quoteTimer<=0){
    const q=dukeQuotes[Math.floor(Math.random()*dukeQuotes.length)];
    document.getElementById('quote').textContent='"'+q+'"';
    quoteTimer=300+Math.random()*200;
  }
  // Duke move
  if(keys['KeyA']||keys['ArrowLeft']){duke.vx=-3.5;duke.facing=-1;}
  else if(keys['KeyD']||keys['ArrowRight']){duke.vx=3.5;duke.facing=1;}
  else duke.vx*=0.7;
  if((keys['Space']||keys['KeyW']||keys['ArrowUp'])&&duke.onGround)duke.vy=-13;
  // Mining
  if(keys['KeyE']){
    let nearest=null,nearDist=65;
    for(const n of miningNodes){
      if(!n.active)continue;
      const d=Math.hypot(duke.x+duke.w/2-n.x,duke.y+duke.h/2-n.y);
      if(d<nearDist){nearest=n;nearDist=d;}
    }
    if(nearest){
      duke.mining=true;duke.mineTimer++;
      nearest.glow=Math.min(nearest.glow+0.05,1);
      if(duke.mineTimer>=60){
        const reward=0.000001*(1+Math.random());
        state.balance+=reward;state.coins++;
        state.hashrate=Math.floor(50+Math.random()*200);
        nearest.active=false;nearest.cooldown=600;nearest.glow=0;
        duke.mineTimer=0;
        spawnParticles(nearest.x,nearest.y,'#ffff00',16);
        addFloat(nearest.x-20,nearest.y-20,'+'+reward.toFixed(6)+' $DUKE','#00ffaa');
        addFloat(duke.x,duke.y-20,'NICE!','#ff6600');
      }
    } else {duke.mining=false;duke.mineTimer=0;}
  } else {duke.mining=false;duke.mineTimer=0;}
  // Node revive
  for(const n of miningNodes){if(!n.active){n.cooldown--;if(n.cooldown<=0){n.active=true;n.glow=0;}}}
  duke.vy+=0.6;duke.x+=duke.vx;duke.y+=duke.vy;
  resolveVsPlats(duke);
  if(duke.shootTimer>0)duke.shootTimer--;else duke.shooting=false;
  // Bullets
  bullets=bullets.filter(b=>{b.x+=b.vx;b.y+=b.vy;b.life--;return b.life>0&&b.x>0&&b.x<W&&b.y>0&&b.y<H;});
  // Spawn
  enemySpawnTimer--;
  if(enemySpawnTimer<=0){spawnEnemy();enemySpawnTimer=Math.max(80,200-state.coins*5);}
  // Enemies
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    e.vy+=0.6;
    const dx=(duke.x+duke.w/2)-(e.x+e.w/2);
    if(Math.abs(dx)>10)e.vx=dx>0?1.5:-1.5;
    e.x+=e.vx;e.y+=e.vy;
    resolveVsPlats(e);
    e.ft++;if(e.ft>10){e.frame=(e.frame+1)%2;e.ft=0;}
    if(collide(duke,e)){state.hp-=0.3;if(state.hp<=0){state.hp=0;state.gameOver=true;}}
    let killed=false;
    for(let j=bullets.length-1;j>=0;j--){
      if(collide({x:bullets[j].x-4,y:bullets[j].y-4,w:8,h:8},e)){
        e.hp--;spawnParticles(bullets[j].x,bullets[j].y,'#ff4400',5);bullets.splice(j,1);
        if(e.hp<=0){spawnParticles(e.x+e.w/2,e.y+e.h/2,'#ff0000',12);addFloat(e.x,e.y,'+1 KILL','#ff6600');enemies.splice(i,1);state.score++;killed=true;break;}
      }
    }
  }
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life--;if(p.life<=0)particles.splice(i,1);}
  for(let i=floatingTexts.length-1;i>=0;i--){const ft=floatingTexts[i];ft.y+=ft.vy;ft.life--;if(ft.life<=0)floatingTexts.splice(i,1);}
  document.getElementById('hp').textContent=Math.ceil(state.hp);
  document.getElementById('coins').textContent=state.coins;
  document.getElementById('hashrate').textContent=state.hashrate;
  document.getElementById('balance').textContent=state.balance.toFixed(6);
  document.getElementById('score').textContent=state.score;
}

function drawDuke(){
  const x=Math.round(duke.x),y=Math.round(duke.y);
  ctx.save();ctx.translate(x+duke.w/2,y+duke.h/2);ctx.scale(duke.facing,1);
  ctx.fillStyle='#5c4a20';ctx.fillRect(-10,-10,20,28);
  ctx.fillStyle='#2a2a2a';ctx.fillRect(-8,-8,16,20);
  ctx.fillStyle='#ff6600';ctx.fillRect(-2,-8,4,14);
  ctx.fillStyle='#e8c080';ctx.fillRect(-9,-28,18,20);
  ctx.fillStyle='#f0d060';ctx.fillRect(-9,-28,18,7);
  ctx.fillStyle='#000';ctx.fillRect(-7,-20,6,4);ctx.fillRect(1,-20,6,4);
  ctx.fillStyle='#333';ctx.fillRect(-1,-20,2,4);
  ctx.fillStyle='#c07040';ctx.fillRect(0,-12,5,2);
  ctx.fillStyle='#e8c080';ctx.fillRect(-14,-8,5,20);ctx.fillRect(9,-8,5,20);
  if(duke.shooting){ctx.fillStyle='#333';ctx.fillRect(12,-6,14,6);ctx.fillStyle='#ffff00';ctx.fillRect(26,-5,8,4);}
  else{ctx.fillStyle='#444';ctx.fillRect(12,2,10,5);}
  if(duke.mining){
    ctx.strokeStyle='#aaa';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(0,5);ctx.lineTo(20,-10);ctx.stroke();
    ctx.fillStyle='#888';ctx.fillRect(18,-14,8,8);
    ctx.fillStyle='#ffaa00';ctx.fillRect(22,-15,5,6);
  }
  ctx.fillStyle='#5c4a20';ctx.fillRect(-8,18,7,18);ctx.fillRect(1,18,7,18);
  ctx.fillStyle='#222';ctx.fillRect(-9,32,9,6);ctx.fillRect(0,32,9,6);
  ctx.restore();
}

function drawEnemy(e){
  const bob=Math.sin(e.frame*Math.PI)*2;
  ctx.save();ctx.translate(Math.round(e.x)+e.w/2,Math.round(e.y)+e.h/2+bob);
  ctx.fillStyle='#33aa44';ctx.beginPath();ctx.ellipse(0,4,12,16,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#55cc66';ctx.beginPath();ctx.ellipse(0,-14,10,12,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ff0000';ctx.beginPath();ctx.arc(-4,-16,4,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(4,-16,4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 5px monospace';ctx.textAlign='center';ctx.fillText('B',-4,-14);ctx.fillText('B',4,-14);
  ctx.strokeStyle='#33aa44';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(-12,0);ctx.lineTo(-20,8);ctx.stroke();ctx.beginPath();ctx.moveTo(12,0);ctx.lineTo(20,8);ctx.stroke();
  ctx.strokeStyle='#88ff88';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-3,-24);ctx.lineTo(-6,-34);ctx.stroke();ctx.beginPath();ctx.moveTo(3,-24);ctx.lineTo(6,-34);ctx.stroke();
  ctx.fillStyle='#ffff00';ctx.beginPath();ctx.arc(-6,-35,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(6,-35,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#300';ctx.fillRect(-12,-44,24,4);ctx.fillStyle='#0f0';ctx.fillRect(-12,-44,24*(e.hp/3),4);
  ctx.restore();
}

function drawMiningNode(n){
  if(!n.active)return;
  const t=Date.now()/1000,bob=Math.sin(t*2+n.x)*4,glow=0.5+Math.sin(t*3)*0.3+n.glow*0.5;
  ctx.save();ctx.translate(n.x,n.y+bob);
  ctx.shadowColor='#ffff00';ctx.shadowBlur=20*glow;
  ctx.fillStyle='rgba(255,200,0,'+(0.7+n.glow*0.3)+')';
  ctx.beginPath();
  for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6,r=16+n.glow*4;if(i===0)ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);else ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
  ctx.closePath();ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
  ctx.shadowBlur=0;ctx.fillStyle='#000';ctx.font='bold 16px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('B',0,0);
  if(n.glow>0){ctx.strokeStyle='#00ffaa';ctx.lineWidth=4;ctx.beginPath();ctx.arc(0,0,22,-Math.PI/2,-Math.PI/2+Math.PI*2*n.glow);ctx.stroke();}
  ctx.restore();
}

function draw(){
  ctx.clearRect(0,0,W,H);
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#050015');grad.addColorStop(0.6,'#0a0020');grad.addColorStop(1,'#100010');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  for(const s of bgStars){s.t++;const a=0.4+Math.sin(s.t*0.05)*0.3;ctx.fillStyle='rgba(200,200,255,'+a+')';ctx.fillRect(s.x,s.y,s.s,s.s);}
  // Skyline
  ctx.fillStyle='#0d0020';
  [[0,60,60,200],[60,80,40,180],[100,40,50,220],[150,70,35,190],[185,50,55,210],[240,30,45,240],[285,65,40,205],[325,45,60,225],[385,75,35,195],[420,35,50,235],[470,55,45,215],[515,40,60,230],[575,65,65,205]].forEach(([x,y,w,h])=>{ctx.fillRect(x,H-h,w,h);});
  // Platforms
  for(const p of platforms){
    const pg=ctx.createLinearGradient(p.x,p.y,p.x,p.y+p.h);pg.addColorStop(0,'#ff6600');pg.addColorStop(1,'#883300');
    ctx.fillStyle=pg;ctx.fillRect(p.x,p.y,p.w,p.h);
    ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=1;
    for(let gx=p.x;gx<p.x+p.w;gx+=16){ctx.beginPath();ctx.moveTo(gx,p.y);ctx.lineTo(gx,p.y+p.h);ctx.stroke();}
  }
  for(const n of miningNodes)drawMiningNode(n);
  for(const p of particles){ctx.fillStyle=p.color;ctx.globalAlpha=p.life/50;ctx.fillRect(p.x-2,p.y-2,4,4);}
  ctx.globalAlpha=1;
  for(const b of bullets){ctx.fillStyle='#ffff00';ctx.shadowColor='#ffff00';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(b.x,b.y,4,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
  for(const e of enemies)drawEnemy(e);
  drawDuke();
  for(const ft of floatingTexts){ctx.globalAlpha=Math.min(1,ft.life/20);ctx.fillStyle=ft.color;ctx.font='bold 11px "Courier New"';ctx.textAlign='center';ctx.textBaseline='top';ctx.strokeStyle='#000';ctx.lineWidth=2;ctx.strokeText(ft.text,ft.x,ft.y);ctx.fillText(ft.text,ft.x,ft.y);}
  ctx.globalAlpha=1;
  if(duke.mining&&duke.mineTimer>0){ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(duke.x-5,duke.y-20,duke.w+10,10);ctx.fillStyle='#00ffaa';ctx.fillRect(duke.x-5,duke.y-20,(duke.w+10)*(duke.mineTimer/60),10);ctx.fillStyle='#fff';ctx.font='8px monospace';ctx.textAlign='center';ctx.fillText('MINING...',duke.x+duke.w/2,duke.y-12);}
  if(state.gameOver){
    ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff0000';ctx.font='bold 52px "Courier New"';ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='#ff0000';ctx.shadowBlur=30;ctx.fillText('YOU DIED',W/2,H/2-40);
    ctx.shadowBlur=0;ctx.fillStyle='#ffaa00';ctx.font='18px "Courier New"';ctx.fillText('Coins: '+state.coins+' | $DUKE: '+state.balance.toFixed(6),W/2,H/2+20);
    ctx.fillStyle='#aaa';ctx.font='14px "Courier New"';ctx.fillText('Press R to try again',W/2,H/2+60);
  }
}
function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>

</body>
</html>
