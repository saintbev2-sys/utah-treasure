<!DOCTYPE html>
<html>
<head>
    <title>Soccer Boss Game - Easy Mode</title>
    <style>
        body { background: #000; color: yellow; text-align: center; font-family: sans-serif; }
        canvas { background: green; border: 5px solid #fff; display: block; margin: 20px auto; touch-action: none; }
        .controls { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        button { padding: 15px 25px; font-size: 18px; background: #222; color: #fff; border: 2px solid green; border-radius: 8px; }
    </style>
</head>
<body>
    <h2>YOU: <span id="pScore">0</span> | CPU: <span id="cScore">0</span></h2>
    <canvas id="game" width="400" height="600"></canvas>
    
    <div class="controls">
        <button onmousedown="move('L')" onmouseup="stop()">◀</button>
        <button onmousedown="move('R')" onmouseup="stop()">▶</button>
        <button onmousedown="move('U')" onmouseup="stop()">▲</button>
        <button onclick="kick()">KICK</button>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        // --- HACKED SETTINGS ---
        let player = { x: 180, y: 500, w: 40, h: 60, speed: 15 }; // Fast player
        let cpu = { x: 180, y: 50, w: 40, h: 60, speed: 1 };      // Very slow CPU
        let ball = { x: 200, y: 300, r: 15, dx: 0, dy: 0 };
        let winScore = 1; // Change this to 1 so you win instantly after scoring
        // -----------------------

        let pScore = 0, cScore = 0, dir = null;

        function move(d) { dir = d; }
        function stop() { dir = null; }
        function kick() { if(Math.abs(player.y - ball.y) < 50) ball.dy = -10; }

        function update() {
            if (dir === 'L' && player.x > 0) player.x -= player.speed;
            if (dir === 'R' && player.x < 360) player.x += player.speed;
            if (dir === 'U' && player.y > 300) player.y -= player.speed;
            else if (player.y < 500) player.y += 5;

            // Ball Physics
            ball.x += ball.dx; ball.y += ball.dy;
            if (ball.x < 15 || ball.x > 385) ball.dx *= -1;
            
            // Scoring
            if (ball.y < 0) { pScore++; reset(); }
            if (ball.y > 600) { cScore++; reset(); }
            
            document.getElementById('pScore').innerText = pScore;
            if (pScore >= winScore) alert("GOAL! YOU WIN! Check the console for your next clue.");
            
            draw();
            requestAnimationFrame(update);
        }

        function reset() { ball = { x: 200, y: 300, r: 15, dx: 0, dy: 0 }; }

        function draw() {
            ctx.clearRect(0, 0, 400, 600);
            ctx.strokeStyle = "#fff"; ctx.strokeRect(100, 0, 200, 50); // Goals
            ctx.fillStyle = "blue"; ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.fillStyle = "red"; ctx.fillRect(cpu.x, cpu.y, cpu.w, cpu.h);
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
        }

        update();
    </script>
</body>
</html>
