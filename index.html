<!DOCTYPE html><html><head><meta name='viewport' content='width=device-width,initial-scale=1'><title>Utah Treasure Hunter</title></head><body style='font-family:Arial;background:#1a0a00;color:#f5deb3;margin:0'><div style='background:#4a2800;padding:15px;text-align:center'><h1 style='color:#ffd700'>Utah Treasure Hunter</h1><p style='color:#c8a000'>Gold - Geocaches - Legends</p></div><div style='display:flex;background:#2a1400'><div id='t0' style='flex:1;padding:10px;text-align:center;color:#ffd700;border-bottom:3px solid #ffd700;font-size:13px' onclick='show(0)'>Map</div><div id='t1' style='flex:1;padding:10px;text-align:center;color:#c8a000;font-size:13px' onclick='show(1)'>Spots</div><div id='t2' style='flex:1;padding:10px;text-align:center;color:#c8a000;font-size:13px' onclick='show(2)'>Finds</div><div id='t3' style='flex:1;padding:10px;text-align:center;color:#c8a000;font-size:13px' onclick='show(3)'>Guide</div></div><div id='con' style='padding:15px'></div><script>var finds=JSON.parse(localStorage.getItem('tf')||'[]');var spots=[{n:'Bingham Canyon',t:'Gold',d:'Historic gold mining. Look for quartz veins.',lat:40.52,lng:-112.14},{n:'Mercur Ghost Town',t:'Gold',d:'Old mining town, carbonate rocks.',lat:40.35,lng:-112.36},{n:'Uinta Mountains',t:'Geocache',d:'Hundreds of caches. Bring GPS.',lat:40.77,lng:-110.50},{n:'Arches NP',t:'Geocache',d:'Mystery caches near the arches.',lat:38.68,lng:-109.57},{n:'Canyonlands',t:'Legend',d:'Remote canyon treasure country.',lat:38.20,lng:-109.93},{n:'Capitol Reef',t:'Legend',d:'Lost Spanish gold mine legends.',lat:38.28,lng:-111.21},{n:'Wasatch Front',t:'Geocache',d:'1000+ caches near SLC.',lat:40.76,lng:-111.89}];function show(i){for(var j=0;j<4;j++){var t=document.getElementById('t'+j);t.style.color=i==j?'#ffd700':'#c8a000';t.style.borderBottom=i==j?'3px solid #ffd700':'none';}var c=document.getElementById('con');if(i==0){var h='<h2 style=color:#ffd700>Utah Treasure Map</h2>';spots.forEach(function(s){h+='<div style=background:#2a1400;border:1px solid #c8a000;border-radius:10px;padding:12px;margin:8px 0><h4 style=color:#ffd700>'+s.n+'</h4><p style=color:#c8a000;font-size:13px>'+s.t+'</p><p style=font-size:13px>'+s.d+'</p><a href="https://maps.apple.com/?ll='+s.lat+','+s.lng+'&q='+s.n+'" style=display:block;background:#c8a000;color:#000;padding:8px;border-radius:8px;text-align:center;margin-top:8px;text-decoration:none;font-weight:bold>Open in Maps</a></div>';});c.innerHTML=h;}if(i==1){var h='<h2 style=color:#ffd700>All Spots</h2>';spots.forEach(function(s){h+='<div style=background:#2a1400;border:1px solid #c8a000;border-radius:10px;padding:12px;margin:8px 0><h4 style=color:#ffd700>'+s.n+'</h4><p style=font-size:13px;color:#c8a000>'+s.t+'</p><p style=font-size:13px>'+s.d+'</p></div>';});c.innerHTML=h;}if(i==2){var h='<h2 style=color:#ffd700>Log a Find</h2><input id=fn placeholder="What did you find?" style=width:100%;background:#1a0a00;border:1px solid #c8a000;color:#f5deb3;padding:10px;border-radius:8px;font-size:15px;margin:6px 0;box-sizing:border-box><input id=fl placeholder="Location" style=width:100%;background:#1a0a00;border:1px solid #c8a000;color:#f5deb3;padding:10px;border-radius:8px;font-size:15px;margin:6px 0;box-sizing:border-box><input type=file id=cam accept=image/* capture=environment style=display:none onchange=showPhoto(this)><button onclick=document.getElementById(\'cam\').click() style=width:100%;background:#4a2800;color:#ffd700;border:2px solid #c8a000;padding:12px;border-radius:8px;font-size:16px;margin:6px 0>Take Photo</button><img id=prev style=width:100%;border-radius:8px;margin:6px 0;display:none><button onclick=addFind() style=width:100%;background:#c8a000;color:#000;border:none;padding:12px;border-radius:8px;font-size:16px;font-weight:bold;margin:6px 0>Add Find</button>';if(!finds.length)h+='<p style=color:#888;text-align:center>No finds yet!</p>';else finds.slice().reverse().forEach(function(f){h+='<div style=background:#2a1400;border:1px solid #c8a000;border-radius:10px;padding:12px;margin:8px 0><h4 style=color:#ffd700>'+f.n+'</h4><p style=color:#c8a000;font-size:13px>'+f.l+'</p>'+(f.img?'<img src='+f.img+' style=width:100%;border-radius:8px>':'')+'</div>';});c.innerHTML=h;}if(i==3){c.innerHTML='<h2 style=color:#ffd700>Guide</h2><div style=background:#2a1400;border:1px solid #c8a000;border-radius:10px;padding:15px;margin:8px 0><h3 style=color:#ffd700>Lost Rhoades Mine</h3><p style=color:#90ee90;font-style:italic>Begin where warm waters of the Uinta Basin halt. Look for the blaze near old Spanish trail markers.</p></div><div style=background:#2a1400;border:1px solid #c8a000;border-radius:10px;padding:15px;margin:8px 0><h3 style=color:#ffd700>Prospecting Tips</h3><p>Pan in streams for black sand. Follow quartz veins. Best areas: Bingham Canyon, Mercur, Gold Hill.</p></div><div style=background:#2a1400;border:1px solid #c8a000;border-radius:10px;padding:15px;margin:8px 0><h3 style=color:#ffd700>Safety</h3><p>Always tell someone your plans. Bring water. No digging in National Parks.</p></div>';}}function showPhoto(input){if(input.files&&input.files[0]){var r=new FileReader();r.onload=function(e){var p=document.getElementById('prev');p.src=e.target.result;p.style.display='block';};r.readAsDataURL(input.files[0]);}}function addFind(){var n=document.getElementById('fn').value;if(!n)return alert('Enter what you found!');finds.push({n:n,l:document.getElementById('fl').value||'Unknown',img:document.getElementById('prev').src||'',d:new Date().toLocaleDateString()});localStorage.setItem('tf',JSON.stringify(finds));show(2);}show(0);</script></body></html>
