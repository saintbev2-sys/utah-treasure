c8a000;font-size:12px>'+s.t+' - '+s.s+'</p><p style=font-size:13px>'+(lang=='es'?s.de:s.d)+'</p><a href="https://maps.apple.com/?ll='+s.lat+','+s.lng+'&q='+encodeURIComponent(s.n)+'" style=display:block;background:#c8a000;color:#000;padding:8px;border-radius:8px;text-align:center;margin-top:6px;text-decoration:none;font-weight:bold>'+t.openmap+'</a></div>';});c.innerHTML=h;}if(i==1){c.innerHTML='<h2 class=gold>GPS</h2><div class=card style=text-align:center><p id=gs style=color:#c8a000>'+t.start+'</p><p id=gc class=gold style=font-size:16px></p><p id=ga style=color:#90ee90;font-size:12px></p><button class=btn onclick=startG() style=background:#c8a000;color:#000>'+t.start+'</button><button class=btn onclick=stopG() style=background:#8b0000;color:#fff>'+t.stop+'</button></div><div class=card><h3 class=gold>'+t.nearest+'</h3><div id=near><p style=color:#888>'+t.startfirst+'</p></div></div>';}if(i==2){var h='<h2 class=gold>'+t.excluclues+'</h2>';clues.forEach(function(cl){h+='<div class=card><b class=gold>'+(lang=='es'?cl.te:cl.t)+'</b> <span style=background:#c8a000;color:#000;padding:1px 6px;border-radius:8px;font-size:11px>'+cl.k+'</span><p style=color:#90ee90;font-style:italic;font-size:13px;margin-top:6px>'+(lang=='es'?cl.ce:cl.c)+'</p></div>';});c.innerHTML=h;}if(i==3){var h='<h2 class=gold>'+t.logfind+'</h2><div class=card><input id=fn placeholder="'+t.whatfind+'"><input id=fl placeholder="'+t.location+'"><button class=btn onclick="document.getElementById(\'cam\').click()" style=background:#4a2800;color:#ffd700;border:2px solid #c8a000>'+t.takephoto+'</button><input type=file id=cam accept="image/*" capture=environment style=display:none onchange=showP(this)><img id=prev style=width:100%;border-radius:8px;display:none><button class=btn onclick=addF() style=background:#c8a000;color:#000>'+t.addfind+'</button><button class=btn onclick=shareF() style=background:#1da1f2;color:#fff>'+t.sharefind+'</button></div>';if(!finds.length)h+='<p style=color:#888;text-align:center>'+t.nofind+'</p>';else finds.slice().reverse().forEach(function(f){h+='<div class=card><b class=gold>'+f.n+'</b><p style=color:#c8a000;font-size:12px>'+f.l+'</p>'+(f.img?'<img src='+f.img+' style=width:100%;border-radius:8px>':'')+'<p style=font-size:11px;color:#666>'+f.d+'</p></div>';});c.innerHTML=h;}if(i==4){var h='<h2 class=gold>'+t.topfind+'</h2>';if(!finds.length){h+='<div class=card><p style=color:#888;text-align:center>'+t.nofindyet+'</p></div>';}else{var m=["🥇","🥈","🥉"];finds.slice().reverse().forEach(function(f,idx){h+='<div class=card style=display:flex;align-items:center><span style=font-size:22px;margin-right:10px>'+(m[idx]||"⭐")+'</span><div><b class=gold>'+f.n+'</b><p style=color:#c8a000;font-size:12px>'+f.l+' - '+f.d+'</p></div></div>';});}c.innerHTML=h;}}function startG(){if(!navigator.geolocation)return;document.getElementById('gs').textContent=tx[lang].tracking;wid=navigator.geolocation.watchPosition(function(p){document.getElementById('gc').textContent='Lat:'+p.coords.latitude.toFixed(4)+' Lng:'+p.coords.longitude.toFixed(4);document.getElementById('ga').textContent=tx[lang].accuracy+':'+Math.round(p.coords.accuracy)+'m';var nr='';spots.forEach(function(s){var d=Math.sqrt(Math.pow((s.lat-p.coords.latitude)*111,2)+Math.pow((s.lng-p.coords.longitude)*111,2));nr+='<div style=padding:6px;border-bottom:1px solid #4a2800><span class=gold>'+s.n+'</span> <span style=color:#888;font-size:11px>'+s.s+'</span><span style=float:right;color:#c8a000>'+d.toFixed(1)+'km</span></div>';});document.getElementById('near').innerHTML=nr;},function(){document.getElementById('gs').textContent=tx[lang].gpserror;},{enableHighAccuracy:true});}function stopG(){if(wid)navigator.geolocation.clearWatch(wid);document.getElementById('gs').textContent=tx[lang].stopped;}function showP(i){if(i.files&&i.files[0]){var r=new FileReader();r.onload=function(e){var p=document.getElementById('prev');p.src=e.target.result;p.style.display='block';};r.readAsDataURL(i.files[0]);}}function
