<!DOCTYPE html><html><head><meta name='viewport' content='width=device-width,initial-scale=1'><title>Utah Treasure Hunter</title></head><body style='font-family:Arial;background:#1a0a00;color:#f5deb3;margin:0'><div style='background:#4a2800;padding:15px;text-align:center'><h1 style='color:#ffd700'>Utah Treasure Hunter</h1><p style='color:#c8a000'>Gold - Geocaches - Legends</p><a href='https://www.paypal.com/donate?business=Bevballz@icloud.com&currency_code=USD' style='display:inline-block;background:#009cde;color:#fff;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:bold;margin-top:10px'>Donate via PayPal</a></div><div style='display:flex;background:#2a1400'><div id='t0' style='flex:1;padding:8px;text-align:center;color:#ffd700;border-bottom:3px solid #ffd700;font-size:12px' onclick='show(0)'>Map</div><div id='t1' style='flex:1;padding:8px;text-align:center;color:#c8a000;font-size:12px' onclick='show(1)'>GPS</div><div id='t2' style='flex:1;padding:8px;text-align:center;color:#c8a000;font-size:12px' onclick='show(2)'>Clues</div><div id='t3' style='flex:1;padding:8px;text-align:center;color:#c8a000;font-size:12px' onclick='show(3)'>Finds</div><div id='t4' style='flex:1;padding:8px;text-align:center;color:#c8a000;font-size:12px' onclick='show(4)'>Guide</div></div><div id='con' style='padding:15px'></div><script>var finds=JSON.parse(localStorage.getItem('tf')||'[]');var watchId=null;var spots=[{n:'Bingham Canyon',t:'Gold',d:'Historic gold mining. Look for quartz veins.',lat:40.52,lng:-112.14},{n:'Mercur Ghost Town',t:'Gold',d:'Old mining town, carbonate rocks.',lat:40.35,lng:-112.36},{n:'Uinta Mountains',t:'Geocache',d:'Hundreds of caches. Bring GPS.',lat:40.77,lng:-110.50},{n:'Arches NP',t:'Geocache',d:'Mystery caches near the arches.',lat:38.68,lng:-109.57},{n:'Canyonlands',t:'Legend',d:'Remote canyon treasure country.',lat:38.20,lng:-109.93},{n:'Capitol Reef',t:'Legend',d:'Lost Spanish gold mine legends.',lat:38.28,lng:-111.21},{n:'Wasatch Front',t:'Geocache',d:'1000+ caches near SLC.',lat:40.76,lng:-111.89}];var clues=[{t:'Lost Rhoades Mine',c:'Begin where warm waters of the Uinta Basin halt. Take the canyon down not far but too far to walk. Look for the blaze near old Spanish trail markers.',k:'Legend'},{t:'Spanish Gold Trail',c:'South of the Great Salt Lake where desert meets red rock. Count seven canyon mouths from the emigrant road. The third alcove holds what the padres left behind.',k:'Legend'},{t:'Butch Cassidy Cache',c:'Robbers Roost canyon. Where the walls close tight and sun only reaches at noon. The outlaw left more than hoofprints.',k:'Legend'},{t:'Uinta Gold Vein',c:'Follow the creek north from the three sisters rocks. Where the water turns and the canyon narrows, look for the quartz outcrop on the east wall.',k:'Gold'},{t:'Desert Rose Cache',c:'Five miles east of the salt flats where the red meets white. A cairn marks the entrance. Bring a headlamp.',k:'Geocache'},{t:'Promontory Treasure',c:'Near where the rails met, beneath the shadow of the golden spike at high noon. The surveyor left something behind in 1869.',k:'Legend'},{t:'Anasazi Cache',c:'The ancient ones left markers in the canyon walls. Follow the petroglyphs south. Where the spiral meets the hand, dig three feet.',k:'Legend'},{t:'Silver Lake Stash',c:'Above the lake where the mountain meets the sky. The prospector marked his claim with three stacked stones facing east.',k:'Gold'}];function show(i){for(var j=0;j<5;j++){var t=document.getElementById('t'+j);t.style.color=i==j?'#ffd700':'#c8a000';t.style.borderBottom=i==j?'3px solid #ffd700':'none';}var c=document.getElementById('con');if(i==0){var h='<h2 style=color:#ffd700>Utah Treasure Map</h2>';spots.forEach(function(s){h+='<div style=background:#2a1400;border:1px solid #c8a000;border-radius:10px;padding:12px;margin:8px 0><h4 style=color:#ffd700>'+s.n+'</h4><p style=color:#c8a000;font-size:13px>'+s.t+'</p><p style=font-size:13px>'+s.d+'</p><a href="https://maps.apple.com/?ll='+s.lat+','+s.lng+'&q='+s.n+'" style=display:block;background:#c8a000;color:#000;padding:8px;border-radius:8px;text-align:center;margin-top:8px;text-decoration:none;font-weight:bold>Open in Maps</a></div>';});c.innerHTML=h;}if(i==1){c.innerHTML='<h2 style=color:#ffd700>GPS Tracker</h2><div style=background:#2a1400;border:1px solid #c8a000;border-radius:10px;padding:15px;margin:8px 0;text-align:center><p id=gps-status style=color:#c8a000;margin-bottom:10px>Tap Start to track your location</p><p id=gps-coords style=color:#ffd700;font-size:18px;margin-bottom:10px></p><p id=gps-accuracy style=color:#90ee90;font-size:13px></p><button onclick=startGPS() id=gps-btn style=background:#c8a000;color:#000;border:none;padding:12px 24px;border-radius:8px;font-size:16px;font-weight:bold;margin:5px>Start Tracking</button><button onclick=stopGPS() style=background:#8b0000;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:16px;font-weight:bold;margin:5px>Stop</button></div><div style=background:#2a1400;border:1px solid #c8a000;border-radius:10px;padding:15px;margin:8px 0><h3 style=color:#ffd700>Nearest Treasure Spots</h3><div id=nearest></div></div>';}if(i==2){var h='<h2 style=color:#ffd700>Exclusive Clues</h2>';clues.forEach(function(cl){h+='<div style=background:#2a1400;border:1px solid #c8a000;border-radius:10px;padding:15px;margin:8px 0><h3 style=color:#ffd700>'+cl.t+'</h3><span style=background:#c8a000;color:#000;padding:2px 8px;border-radius:10px;font-size:11px>'+cl.k+'</span><p style=color:#90ee90;font-style:italic;font-size:14px;margin-top:8px>'+cl.c+'</p></div>';});c.innerHTML=h;}if(i==3){var h='<h2 style=color:#ffd700>Log a Find</h2><input id=fn placeholder="What did you find?" style=width:100%;background:#1a0a00;border:1px solid #c8a000;color:#f5deb3;padding:10px;border-radius:8px;font-size:15px;margin:6px 0;box-sizing:border-box><input id=fl placeholder="Location" style=width:100%;background:#1a0a00;border:1px solid #c8a000;color:#f5deb3;padding:10px;border-radius:8px;font-size:15px;margin:6px 0;box-sizing:border-box><button onclick="document.getElementById(\'cam\').click()" style=width:100%;background:#4a2800;color:#ffd700;border:2px solid #c8a000;padding:12px;border-radius:8px;font-size:16px;margin:6px 0>Take Photo</button><input type=file id=cam accept="image/*" capture=environment style=display:none onchange=showPhoto(this)><img id=prev style=width:100%;border-radius:8px;margin:6px 0;display:none><button onclick=addFind() style=width:100%;background:#c8a000;color:#000;border:none;padding:12px;border-radius:8px;font-size:16px;font-weight:bold;margin:6px 0>Add Find</button>';if(!finds.length)h+='<p style=color:#888;text-align:center>No finds yet!</p>';else finds.slice().reverse().forEach(function(f){h+='<div style=background:#2a1400;border:1px solid #c8a000;border-radius:10px;padding:12px;margin:8px 0><h4 style=color:#ffd700>'+f.n+'</h4><p style=color:#c8a000;font-size:13px>'+f.l+'</p>'+(f.img?'<img src='+f.img+' style=width:100%;border-radius:8px>':'')+'<p style=font-size:11px;color:#666>'+f.d+'</p></div>';});c.innerHTML=h;}if(i==4){c.innerHTML='<h2 style=color:#ffd700>Guide</h2><div style=background:#2a1400;border:1px solid #c8a000;border-radius:10px;padding:15px;margin:8px 0><h3 style=color:#ffd700>Gold Prospecting</h3><p>Best areas: Bingham Canyon, Mercur, Gold Hill. Pan in streams for black sand. Follow quartz veins.</p></div><div style=background:#2a1400;border:1px solid #c8a000;border-radius:10px;padding:15px;margin:8px 0><h3 style=color:#ffd700>Geocaching</h3><p>Utah has 50000+ caches. Visit geocaching.com. Bring a pen to sign logs.</p></div><div style=background:#2a1400;border:1px solid #c8a000;border-radius:10px;padding:15px;margin:8px 0><h3 style=color:#ffd700>Safety</h3><p>Always tell someone your plans. Bring water. No digging in National Parks.</p></div>';}}function startGPS(){if(!navigator.geolocation){document.getElementById('gps-status').textContent='GPS not supported';return;}document.getElementById('gps-status').textContent='Tracking...';document.getElementById('gps-btn').style.background='#4a8000';watchId=navigator.geolocation.watchPosition(function(pos){var lat=pos.coords.latitude.toFixed(5);var lng=pos.coords.longitude.toFixed(5);var acc=Math.round(pos.coords.accuracy);document.getElementById('gps-coords').textContent='Lat: '+lat+' Lng: '+lng;document.getElementById('gps-accuracy').textContent='Accuracy: '+acc+' meters';var nearest='';spots.forEach(function(s){var d=Math.sqrt(Math.pow((s.lat-pos.coords.latitude)*111,2)+Math.pow((s.lng-pos.coords.longitude)*111,2));nearest+='<div style=padding:8px;border-bottom:1px solid #4a2800><span style=color:#ffd700>'+s.n+'</span><span style=float:right;color:#c8a000>'+d.toFixed(1)+' km</span></div>';});document.getElementById('nearest').innerHTML=nearest;},function(){document.getElementById('gps-status').textContent='GPS error - check permissions';},{enableHighAccuracy:true,maximumAge:10000});}function stopGPS(){if(watchId)navigator.geolocation.clearWatch(watchId);document.getElementById('gps-status').textContent='Tracking stopped';document.getElementById('gps-btn').style.background='#c8a000';}function showPhoto(input){if(input.files&&input.files[0]){var r=new FileReader();r.onload=function(e){var p=document.getElementById('prev');p.src=e.target.result;p.style.display='block';};r.readAsDataURL(input.files[0]);}}function addFind(){var n=document.getElementById('fn').value;if(!n)return alert('Enter what you found!');finds.push({n:n,l:document.getElementById('fl').value||'Unknown',img:document.getElementById('prev').src||'',d:new Date().toLocaleDateString()});localStorage.setItem('tf',JSON.stringify(finds));show(3);}show(0);</script></body></html>
