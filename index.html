<!DOCTYPE html><html><head><meta name='viewport' content='width=device-width,initial-scale=1'><title>Utah Treasure Hunter</title><style>body{font-family:Arial;background:#1a0a00;color:#f5deb3;margin:0}.card{background:#2a1400;border:1px solid #c8a000;border-radius:10px;padding:12px;margin:8px 0}.gold{color:#ffd700}input{width:100%;background:#1a0a00;border:1px solid #c8a000;color:#f5deb3;padding:10px;border-radius:8px;font-size:15px;margin:4px 0;box-sizing:border-box}.btn{width:100%;padding:12px;border-radius:8px;font-size:15px;font-weight:bold;border:none;margin:4px 0;cursor:pointer}</style></head><body><div style='background:#4a2800;padding:15px;text-align:center'><h1 class=gold>Utah Treasure Hunter</h1><p style='color:#c8a000'>15 Locations - GPS - Clues - Leaderboard</p><a href='https://www.paypal.com/donate?business=Bevballz@icloud.com&currency_code=USD' style='display:inline-block;background:#009cde;color:#fff;padding:10px 20px;border-radius:8px;text-decoration:none;font-weight:bold;margin-top:8px'>Donate via PayPal</a></div><div style='display:flex;background:#2a1400'><div id='t0' class=gold style='flex:1;padding:8px;text-align:center;border-bottom:3px solid #ffd700;font-size:11px;cursor:pointer' onclick='show(0)'>Map</div><div id='t1' style='flex:1;padding:8px;text-align:center;color:#c8a000;font-size:11px;cursor:pointer' onclick='show(1)'>GPS</div><div id='t2' style='flex:1;padding:8px;text-align:center;color:#c8a000;font-size:11px;cursor:pointer' onclick='show(2)'>Clues</div><div id='t3' style='flex:1;padding:8px;text-align:center;color:#c8a000;font-size:11px;cursor:pointer' onclick='show(3)'>Finds</div><div id='t4' style='flex:1;padding:8px;text-align:center;color:#c8a000;font-size:11px;cursor:pointer' onclick='show(4)'>Top 10</div></div><div id='con' style='padding:15px'></div><script>var finds=JSON.parse(localStorage.getItem('tf')||'[]');var wid=null;var spots=[{n:'Bingham Canyon',t:'Gold',d:'Historic gold mining.',lat:40.52,lng:-112.14,x:'Hard'},{n:'Mercur Ghost Town',t:'Gold',d:'Old gold mining town.',lat:40.35,lng:-112.36,x:'Hard'},{n:'Gold Hill',t:'Gold',d:'Active gold near Nevada.',lat:40.02,lng:-113.82,x:'Medium'},{n:'Ophir Canyon',t:'Gold',d:'Silver and gold deposits.',lat:40.37,lng:-112.12,x:'Medium'},{n:'Tintic District',t:'Gold',d:'Historic mines Juab County.',lat:39.90,lng:-112.13,x:'Hard'},{n:'Uinta Mountains',t:'Geocache',d:'Hundreds of caches.',lat:40.77,lng:-110.50,x:'Easy'},{n:'Arches NP',t:'Geocache',d:'Mystery caches.',lat:38.68,lng:-109.57,x:'Easy'},{n:'Bryce Canyon',t:'Geocache',d:'Hidden caches in hoodoos.',lat:37.59,lng:-112.18,x:'Easy'},{n:'Zion Narrows',t:'Geocache',d:'Caches along Virgin River.',lat:37.28,lng:-112.94,x:'Medium'},{n:'Wasatch Front',t:'Geocache',d:'1000+ caches near SLC.',lat:40.76,lng:-111.89,x:'Easy'},{n:'Canyonlands',t:'Legend',d:'Remote canyon treasure.',lat:38.20,lng:-109.93,x:'Hard'},{n:'Capitol Reef',t:'Legend',d:'Lost Spanish gold.',lat:38.28,lng:-111.21,x:'Hard'},{n:'Nine Mile Canyon',t:'Legend',d:'Petroglyphs mark the gold.',lat:39.82,lng:-110.17,x:'Hard'},{n:'Bear Lake',t:'Legend',d:'Pioneer treasure.',lat:41.93,lng:-111.32,x:'Medium'},{n:'Dugway Desert',t:'Prospecting',d:'Geode beds and minerals.',lat:40.18,lng:-113.02,x:'Medium'}];var clues=[{t:'Lost Rhoades Mine',c:'Begin where warm waters halt. Look for the blaze near old Spanish trail markers.',k:'Legend'},{t:'Spanish Gold',c:'South of Great Salt Lake. Count seven canyon mouths. The third alcove holds what the padres left.',k:'Legend'},{t:'Butch Cassidy Cache',c:'Robbers Roost. Where walls close tight and sun only reaches at noon.',k:'Legend'},{t:'Uinta Gold Vein',c:'Follow creek north from three sisters rocks. Quartz on the east wall.',k:'Gold'},{t:'Nine Mile Gold',c:'Third petroglyph panel on north wall hides the marker.',k:'Legend'},{t:'Bear Lake Chest',c:'Fifty paces north from old trading post. Where springs meet lake at dawn.',k:'Legend'},{t:'Promontory Treasure',c:'Where the rails met, beneath the golden spike shadow at noon.',k:'Legend'},{t:'Anasazi Cache',c:'Follow petroglyphs south. Where spiral meets the hand.',k:'Legend'},{t:'Desert Rose',c:'Five miles east of salt flats. A cairn marks the entrance.',k:'Geocache'},{t:'Silver Lake Stash',c:'Above the lake. Three stacked stones face east.',k:'Gold'}];function dc(d){return d=='Easy'?'#2d8a00':d=='Medium'?'#8a6000':'#8a0000';}function show(i){for(var j=0;j<5;j++){var t=document.getElementById('t'+j);t.style.color=i==j?'#ffd700':'#c8a000';t.style.borderBottom=i==j?'3px solid #ffd700':'none';}var c=document.getElementById('con');if(i==0){var h='<h2 class=gold>'+spots.length+' Utah Locations</h2>';spots.forEach(function(s){h+='<div class=card><div style=display:flex;justify-content:space-between><b class=gold>'+s.n+'</b><span style=background:'+dc(s.x)+';color:#fff;padding:1px 6px;border-radius:8px;font-size:11px>'+s.x+'</span></div><p style=color:#c8a000;font-size:12px>'+s.t+'</p><p style=font-size:13px>'+s.d+'</p><a href="https://maps.apple.com/?ll='+s.lat+','+s.lng+'&q='+encodeURIComponent(s.n)+'" style=display:block;background:#c8a000;color:#000;padding:8px;border-radius:8px;text-align:center;margin-top:6px;text-decoration:none;font-weight:bold>Open in Maps</a></div>';});c.innerHTML=h;}if(i==1){c.innerHTML='<h2 class=gold>GPS Tracker</h2><div class=card style=text-align:center><p id=gs style=color:#c8a000>Tap Start to track</p><p id=gc class=gold style=font-size:16px></p><p id=ga style=color:#90ee90;font-size:12px></p><button class=btn onclick=startG() style=background:#c8a000;color:#000>Start Tracking</button><button class=btn onclick=stopG() style=background:#8b0000;color:#fff>Stop</button></div><div class=card><h3 class=gold>Nearest Spots</h3><div id=near><p style=color:#888>Start GPS first</p></div></div>';}if(i==2){var h='<h2 class=gold>'+clues.length+' Clues</h2>';clues.forEach(function(cl){h+='<div class=card><b class=gold>'+cl.t+'</b> <span style=background:#c8a000;color:#000;padding:1px 6px;border-radius:8px;font-size:11px>'+cl.k+'</span><p style=color:#90ee90;font-style:italic;font-size:13px;margin-top:6px>'+cl.c+'</p></div>';});c.innerHTML=h;}if(i==3){var h='<h2 class=gold>Log a Find</h2><div class=card><input id=fn placeholder="What did you find?"><input id=fl placeholder="Location"><button class=btn onclick="document.getElementById(\'cam\').click()" style=background:#4a2800;color:#ffd700;border:2px solid #c8a000>Take Photo</button><input type=file id=cam accept="image/*" capture=environment style=display:none onchange=showP(this)><img id=prev style=width:100%;border-radius:8px;display:none><button class=btn onclick=addF() style=background:#c8a000;color:#000>Add Find</button><button class=btn onclick=shareF() style=background:#1da1f2;color:#fff>Share Find</button></div>';if(!finds.length)h+='<p style=color:#888;text-align:center>No finds yet!</p>';else finds.slice().reverse().forEach(function(f){h+='<div class=card><b class=gold>'+f.n+'</b><p style=color:#c8a000;font-size:12px>'+f.l+'</p>'+(f.img?'<img src='+f.img+' style=width:100%;border-radius:8px>':'')+'<p style=font-size:11px;color:#666>'+f.d+'</p></div>';});c.innerHTML=h;}if(i==4){var h='<h2 class=gold>Top Finders</h2>';if(!finds.length){h+='<div class=card><p style=color:#888;text-align:center>No finds yet! Be first!</p></div>';}else{var m=["🥇","🥈","🥉"];finds.slice().reverse().forEach(function(f,idx){h+='<div class=card style=display:flex;align-items:center><span style=font-size:22px;margin-right:10px>'+(m[idx]||"⭐")+'</span><div><b class=gold>'+f.n+'</b><p style=color:#c8a000;font-size:12px>'+f.l+' - '+f.d+'</p></div></div>';});}c.innerHTML=h;}}function startG(){if(!navigator.geolocation)return;document.getElementById('gs').textContent='Tracking...';wid=navigator.geolocation.watchPosition(function(p){document.getElementById('gc').textContent='Lat:'+p.coords.latitude.toFixed(4)+' Lng:'+p.coords.longitude.toFixed(4);document.getElementById('ga').textContent='Accuracy:'+Math.round(p.coords.accuracy)+'m';var nr='';spots.forEach(function(s){var d=Math.sqrt(Math.pow((s.lat-p.coords.latitude)*111,2)+Math.pow((s.lng-p.coords.longitude)*111,2));nr+='<div style=padding:6px;border-bottom:1px solid #4a2800><span class=gold>'+s.n+'</span><span style=float:right;color:#c8a000>'+d.toFixed(1)+'km</span></div>';});document.getElementById('near').innerHTML=nr;},function(){document.getElementById('gs').textContent='GPS error';},{enableHighAccuracy:true});}function stopG(){if(wid)navigator.geolocation.clearWatch(wid);document.getElementById('gs').textContent='Stopped';}function showP(i){if(i.files&&i.files[0]){var r=new FileReader();r.onload=function(e){var p=document.getElementById('prev');p.src=e.target.result;p.style.display='block';};r.readAsDataURL(i.files[0]);}}function addF(){var n=document.getElementById('fn').value;if(!n)return alert('Enter what you found!');finds.push({n:n,l:document.getElementById('fl').value||'Unknown',img:document.getElementById('prev').src||'',d:new Date().toLocaleDateString()});localStorage.setItem('tf',JSON.stringify(finds));show(3);}function shareF(){if(navigator.share){navigator.share({title:'Utah Treasure Hunter',text:'Check out this free treasure hunting app!',url:'https://saintbev2-sys.github.io/utah-treasure'});}else{alert('Link: https://saintbev2-sys.github.io/utah-treasure');}}show(0);</script></body></html>
