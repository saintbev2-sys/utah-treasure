<!DOCTYPE html><html><head><meta name='viewport' content='width=device-width,initial-scale=1,user-scalable=no'><title>Gold Hunter</title><style>*{margin:0;padding:0}body{background:#000;display:flex;flex-direction:column;height:100vh;overflow:hidden}#hud{color:#ffd700;font-family:Arial;font-size:16px;padding:6px;display:flex;justify-content:space-around;background:#111;flex-shrink:0}#game{flex:1;position:relative}canvas{width:100%;height:100%}#btns{display:flex;justify-content:space-between;padding:8px;background:#111;flex-shrink:0;gap:8px}#btns button{flex:1;background:#333;color:#ffd700;border:2px solid #ffd700;border-radius:10px;padding:16px;font-size:18px;font-weight:bold}#bs{background:#8b0000!important;border-color:#f00!important}</style></head><body><div id=hud><span id=hp>❤️ 100</span><span id=sc>SCORE: 0</span><span id=am>AMMO: 30</span></div><div id=game><canvas id=c></canvas></div><div id=btns><button id=bl>◀</button><button id=br>▶</button><button id=bj>JUMP</button><button id=bs>FIRE</button></div><script>var c=document.getElementById('c');var g=document.getElementById('game');c.width=window.innerWidth;c.height=g.offsetHeight;var ctx=c.getContext('2d');var W=c.width,H=c.height,G=H-50;var p={x:60,y:G-50,w:32,h:50,vx:0,vy:0,gr:true,hp:100,dir:1,ml:false,mr:false};var bullets=[],enemies=[],score=0,ammo=30,et=0;var platforms=[{x:0,y:G,w:W,h:50},{x:100,y:G-90,w:110,h:12},{x:280,y:G-150,w:110,h:12},{x:460,y:G-90,w:110,h:12}];function fire(){if(ammo<=0)return;ammo--;document.getElementById('am').textContent='AMMO: '+ammo;bullets.push({x:p.x+(p.dir>0?p.w:0),y:p.y+20,vx:p.dir*10,w:8,h:4});}function jump(){if(p.gr){p.vy=-13;p.gr=false;}}document.getElementById('bl').addEventListener('touchstart',function(e){e.preventDefault();p.ml=true;},{passive:false});document.getElementById('bl').addEventListener('touchend',function(e){e.preventDefault();p.ml=false;},{passive:false});document.getElementById('br').addEventListener('touchstart',function(e){e.preventDefault();p.mr=true;},{passive:false});document.getElementById('br').addEventListener('touchend',function(e){e.preventDefault();p.mr=false;},{passive:false});document.getElementById('bj').addEventListener('touchstart',function(e){e.preventDefault();jump();},{passive:false});document.getElementById('bs').addEventListener('touchstart',function(e){e.preventDefault();fire();},{passive:false});function hit(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}function update(){if(p.ml){p.vx=-4;p.dir=-1;}else if(p.mr){p.vx=4;p.dir=1;}else p.vx=0;p.vy+=0.6;p.x+=p.vx;p.y+=p.vy;p.gr=false;if(p.x<0)p.x=0;if(p.x+p.w>W)p.x=W-p.w;if(p.y>H){p.y=G-50;p.vy=0;}for(var i=0;i<platforms.length;i++){var pl=platforms[i];if(p.vy>=0&&p.x+p.w>pl.x&&p.x<pl.x+pl.w&&p.y+p.h>=pl.y&&p.y+p.h<=pl.y+20){p.y=pl.y-p.h;p.vy=0;p.gr=true;}}bullets=bullets.filter(function(b){return b.x>0&&b.x<W;});for(var i=0;i<bullets.length;i++)bullets[i].x+=bullets[i].vx;et++;if(et>80){var side=Math.random()>0.5?W+10:-10;enemies.push({x:side,y:G-40,w:32,h:40,vx:side>0?-2:2,hp:2,vy:0});et=0;}for(var i=enemies.length-1;i>=0;i--){var e=enemies[i];e.x+=e.vx;e.vy+=0.6;e.y+=e.vy;for(var k=0;k<platforms.length;k++){var pl=platforms[k];if(e.vy>=0&&e.x+e.w>pl.x&&e.x<pl.x+pl.w&&e.y+e.h>=pl.y&&e.y+e.h<=pl.y+20){e.y=pl.y-e.h;e.vy=0;}}if(hit(e,p)){p.hp-=0.3;document.getElementById('hp').textContent='❤️ '+Math.max(0,Math.floor(p.hp));}for(var j=bullets.length-1;j>=0;j--){if(hit(bullets[j],e)){e.hp--;bullets.splice(j,1);if(e.hp<=0){enemies.splice(i,1);score+=100;document.getElementById('sc').textContent='SCORE: '+score;}break;}}if(e.x<-50||e.x>W+50)enemies.splice(i,1);}if(ammo==0&&Math.random()<0.004){ammo=30;document.getElementById('am').textContent='AMMO: 30';}}function draw(){ctx.fillStyle='#000033';ctx.fillRect(0,0,W,H);for(var i=0;i<platforms.length;i++){var pl=platforms[i];ctx.fillStyle=pl.h>30?'#2d4a1e':'#5a3a1a';ctx.fillRect(pl.x,pl.y,pl.w,pl.h);}ctx.fillStyle='#ff0';for(var i=0;i<bullets.length;i++)ctx.fillRect(bullets[i].x,bullets[i].y,bullets[i].w,bullets[i].h);for(var i=0;i<enemies.length;i++){var e=enemies[i];ctx.fillStyle='#8b0000';ctx.fillRect(e.x,e.y,e.w,e.h);ctx.fillStyle='#ff0';ctx.fillRect(e.x+5,e.y+8,6,6);ctx.fillRect(e.x+20,e.y+8,6,6);}ctx.fillStyle='#4a90d9';ctx.fillRect(p.x,p.y+20,p.w,30);ctx.fillStyle='#f5c89a';ctx.fillRect(p.x+6,p.y,20,20);ctx.fillStyle='#333';ctx.fillRect(p.x+(p.dir>0?22:0),p.y+24,12,5);if(p.hp<=0){ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#f00';ctx.font='bold 40px Arial';ctx.textAlign='center';ctx.fillText('GAME OVER',W/2,H/2);ctx.fillStyle='#ffd700';ctx.font='24px Arial';ctx.fillText('Score: '+score,W/2,H/2+40);return;}}function loop(){update();draw();requestAnimationFrame(loop);}loop();</script></body></html>
