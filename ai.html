<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05070f;
    --surface: #0d1120;
    --border: #1e2a45;
    --cyan: #00e5ff;
    --cyan-dim: rgba(0,229,255,0.12);
    --cyan-glow: rgba(0,229,255,0.4);
    --text: #e8eaf6;
    --text-dim: #6b7a99;
    --user-bg: #0a2a3a;
    --ai-bg: #0d1829;
    --error: #ff5370;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(0,229,255,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 480px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
  }

  header {
    padding: 18px 20px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    background: rgba(5,7,15,0.9);
    backdrop-filter: blur(20px);
    flex-shrink: 0;
  }

  .logo-icon {
    width: 38px;
    height: 38px;
    background: var(--cyan-dim);
    border: 1px solid var(--cyan-glow);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 16px var(--cyan-dim);
    flex-shrink: 0;
  }

  .header-text h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 17px;
    color: var(--cyan);
    letter-spacing: 0.05em;
  }

  .header-text p {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    margin-top: 1px;
  }

  .header-actions {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .clear-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 5px 10px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .clear-btn:hover { border-color: var(--cyan); color: var(--cyan); }

  .status-dot {
    width: 7px;
    height: 7px;
    background: #00e676;
    border-radius: 50%;
    box-shadow: 0 0 8px #00e676;
    animation: pulse 2.5s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px #00e676; }
    50% { opacity: 0.5; box-shadow: 0 0 4px #00e676; }
  }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar { width: 3px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  .message {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.25s ease forwards;
    opacity: 0;
    transform: translateY(8px);
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .message.ai .avatar {
    background: var(--cyan-dim);
    border: 1px solid rgba(0,229,255,0.2);
    box-shadow: 0 0 10px var(--cyan-dim);
  }

  .message.user .avatar {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
  }

  .bubble {
    max-width: calc(100% - 50px);
    padding: 11px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.65;
    letter-spacing: 0.01em;
  }

  .message.ai .bubble {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .message.user .bubble {
    background: var(--user-bg);
    border: 1px solid rgba(0,229,255,0.2);
    border-top-right-radius: 4px;
    color: var(--cyan);
  }

  .typing-dots {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 2px;
  }

  .typing-dots span {
    width: 6px;
    height: 6px;
    background: var(--cyan);
    border-radius: 50%;
    animation: dot 1.2s ease-in-out infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
    40% { transform: scale(1); opacity: 1; }
  }

  .input-area {
    padding: 12px 14px 24px;
    border-top: 1px solid var(--border);
    background: rgba(5,7,15,0.9);
    backdrop-filter: blur(20px);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  #userInput {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    outline: none;
    resize: none;
    max-height: 120px;
    min-height: 46px;
    line-height: 1.5;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #userInput:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px var(--cyan-dim);
  }

  #userInput::placeholder { color: var(--text-dim); }

  #sendBtn {
    width: 46px;
    height: 46px;
    background: var(--cyan);
    border: none;
    border-radius: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 0 16px var(--cyan-glow);
  }

  #sendBtn:hover { transform: scale(1.06); box-shadow: 0 0 24px var(--cyan-glow); }
  #sendBtn:active { transform: scale(0.95); }
  #sendBtn:disabled { background: var(--border); box-shadow: none; cursor: not-allowed; }

  #sendBtn svg { width: 18px; height: 18px; }

  .bubble strong { color: var(--cyan); font-weight: 600; }
  .bubble code {
    background: rgba(0,229,255,0.1);
    border: 1px solid rgba(0,229,255,0.2);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 13px;
  }
  .bubble p + p { margin-top: 8px; }
  .bubble ul, .bubble ol { padding-left: 18px; margin-top: 6px; }
  .bubble li { margin-bottom: 3px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-icon">⚡</div>
    <div class="header-text">
      <h1>MINI AI</h1>
      <p>Powered by Gemini · Always ready</p>
    </div>
    <div class="header-actions">
      <button class="clear-btn" onclick="clearChat()">Clear</button>
      <div class="status-dot"></div>
    </div>
  </header>

  <div class="chat-area" id="chatArea"></div>

  <div class="input-area">
    <textarea id="userInput" placeholder="Ask me anything…" rows="1"></textarea>
    <button id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
  const API_KEY = "AIzaSyDG-cqEFb0OefxG4kLVyFhdWVGOzxYEf2o";
  const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`;

  let history = [];
  let isTyping = false;

  const SYSTEM = `You are Mini AI — a smart, friendly, and helpful personal assistant. 
Be concise but thorough. Use markdown for formatting when helpful. 
You can help with anything: answering questions, writing, coding, math, ideas, advice, and more.
Be conversational and warm. You are running as a personal web app.`;

  // Load saved history
  try {
    const saved = localStorage.getItem('miniAiHistory');
    if (saved) history = JSON.parse(saved);
  } catch(e) { history = []; }

  // Render saved messages on load
  window.addEventListener('load', () => {
    if (history.length === 0) {
      addMessage('ai', "Hey! 👋 I'm Mini AI powered by Gemini. Ask me anything!");
    } else {
      history.forEach(m => renderMessage(m.role === 'user' ? 'user' : 'ai', m.parts[0].text));
    }
  });

  function renderMessage(role, text) {
    const area = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'ai' ? '⚡' : '👤';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = renderMarkdown(text);

    div.appendChild(avatar);
    div.appendChild(bubble);
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
    return bubble;
  }

  function addMessage(role, text) {
    return renderMessage(role, text);
  }

  function showTyping() {
    const area = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'message ai';
    div.id = 'typingIndicator';
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '⚡';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
    div.appendChild(avatar);
    div.appendChild(bubble);
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typingIndicator');
    if (t) t.remove();
  }

  function renderMarkdown(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>')
      .replace(/^/, '<p>').replace(/$/, '</p>')
      .replace(/<p><\/p>/g, '');
  }

  async function sendMessage() {
    if (isTyping) return;
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    addMessage('user', text);

    history.push({ role: 'user', parts: [{ text }] });

    isTyping = true;
    document.getElementById('sendBtn').disabled = true;
    showTyping();

    try {
      const body = {
        system_instruction: { parts: [{ text: SYSTEM }] },
        contents: history,
        generationConfig: {
          temperature: 0.9,
          maxOutputTokens: 1024
        }
      };

      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      const data = await res.json();

      if (!res.ok) {
        const errMsg = data?.error?.message || 'API error';
        removeTyping();
        addMessage('ai', `⚠️ ${errMsg}`);
        history.pop();
      } else {
        const reply = data.candidates[0].content.parts[0].text;
        history.push({ role: 'model', parts: [{ text: reply }] });
        // Save history (keep last 20 turns)
        if (history.length > 40) history = history.slice(-40);
        localStorage.setItem('miniAiHistory', JSON.stringify(history));
        removeTyping();
        addMessage('ai', reply);
      }

    } catch (err) {
      removeTyping();
      addMessage('ai', '⚠️ Network error. Check your connection.');
      history.pop();
    }

    isTyping = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('userInput').focus();
  }

  function clearChat() {
    history = [];
    localStorage.removeItem('miniAiHistory');
    document.getElementById('chatArea').innerHTML = '';
    addMessage('ai', "Chat cleared! 🧹 What's on your mind?");
  }

  // Auto-resize textarea
  const ta = document.getElementById('userInput');
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
  });

  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>
</body>
</html>
