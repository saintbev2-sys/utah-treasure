<div id="root"></div>
<script type="text/babel">
const { useState, useCallback } = React;
const PAY = 14.50;
const SAMPLE = [
  { id:1, address:"1234 W 4700 S, Taylorsville, UT", client:"Allstate", contactName:"John Smith", contactPhone:"8015550101", priority:"high", claimNumber:"ALL-2024-0091" },
  { id:2, address:"892 E 3300 S, Salt Lake City, UT", client:"Farmers", contactName:"Maria Lopez", contactPhone:"8015550182", priority:"high", claimNumber:"FRM-2024-0342" },
  { id:3, address:"3401 S 900 W, South Salt Lake, UT", client:"Allstate", contactName:"Derek Hines", contactPhone:"8015550263", priority:"medium", claimNumber:"ALL-2024-0105" },
  { id:4, address:"5620 S Redwood Rd, Murray, UT", client:"Farmers", contactName:"Tanya Brooks", contactPhone:"8015550374", priority:"medium", claimNumber:"FRM-2024-0388" },
  { id:5, address:"410 E 12300 S, Draper, UT", client:"Allstate", contactName:"Carl Webb", contactPhone:"8015550445", priority:"low", claimNumber:"ALL-2024-0117" },
  { id:6, address:"2245 W 7800 S, West Jordan, UT", client:"Farmers", contactName:"Sandra Lee", contactPhone:"8015550556", priority:"medium", claimNumber:"FRM-2024-0401" },
];
const CC = { Allstate:"#60a5fa", Farmers:"#fb923c" };
const PO = { high:0, medium:1, low:2 };
const TMPL = {
  Allstate:(j,n)=>`Hi ${j.contactName}, this is ${n} with Allstate Insurance field services. I am scheduled to conduct an exterior survey of your property at ${j.address} for claim #${j.claimNumber}. This is an EXTERIOR ONLY inspection — no interior access needed. I will be visiting shortly. Questions? Reply here. Thank you!`,
  Farmers:(j,n)=>`Hi ${j.contactName}, this is ${n} with Farmers Insurance field services. I am assigned to complete an exterior property survey at ${j.address} for claim #${j.claimNumber}. This is an EXTERIOR inspection only — you do not need to be home. I will be by shortly. Questions? Reply here. Thank you!`,
};
const IS = { width:"100%", padding:"10px 12px", background:"rgba(0,0,0,0.4)", border:"1px solid #1e3a2e", borderRadius:"6px", color:"#d1fae5", fontSize:"14px", outline:"none", boxSizing:"border-box" };

function App() {
const [jobs, setJobs] = useState(SAMPLE);
const [done, setDone] = useState([]);
const [tab, setTab] = useState(“route”);
const [optimizing, setOpt] = useState(false);
const [optimized, setOptd] = useState(false);
const [name, setName] = useState(“Your Name”);
const [editName, setEditName] = useState(false);
const [modal, setModal] = useState(null);
const [nj, setNj] = useState({ address:””, client:“Allstate”, contactName:””, contactPhone:””, claimNumber:””, priority:“medium” });

const pending = jobs.filter(j=>!done.includes(j.id));
const completed = jobs.filter(j=>done.includes(j.id));
const earned = completed.length * PAY;
const pendingPay = pending.length * PAY;

const optimize = useCallback(()=>{
setOpt(true);
setTimeout(()=>{
setJobs(p=>[…p].sort((a,b)=>{
if(done.includes(a.id)) return 1;
if(done.includes(b.id)) return -1;
return PO[a.priority]-PO[b.priority];
}));
setOptd(true); setOpt(false);
},1200);
},[jobs,done]);

const toggle = id => setDone(p=>p.includes(id)?p.filter(x=>x!==id):[…p,id]);
const remove = id => { setJobs(p=>p.filter(j=>j.id!==id)); setDone(p=>p.filter(x=>x!==id)); };
const maps = addr => window.open(`https://maps.google.com/maps?q=${encodeURIComponent(addr)}`,”_blank”);
const fullRoute = () => {
const p=jobs.filter(j=>!done.includes(j.id));
if(!p.length) return;
window.open(`https://www.google.com/maps/dir/${p.map(j=>encodeURIComponent(j.address)).join("/")}`, “_blank”);
};
const sms = j => {
const msg=TMPL[j.client](j,name);
window.open(`sms:${j.contactPhone.replace(/\D/g,"")}?body=${encodeURIComponent(msg)}`,”_blank”);
setModal(null);
};
const addJob = () => {
if(!nj.address||!nj.contactName) return;
setJobs(p=>[…p,{…nj,id:Date.now(),claimNumber:nj.claimNumber||`${nj.client.slice(0,3).toUpperCase()}-${Date.now()}`}]);
setNj({address:””,client:“Allstate”,contactName:””,contactPhone:””,claimNumber:””,priority:“medium”});
setTab(“route”); setOptd(false);
};

const s = (color,size,extra={}) => ({…extra, color, fontSize:size||“inherit”});
const btn = (bg,border,color,extra={}) => ({…extra, background:bg, border:`1px solid ${border}`, borderRadius:“8px”, color, cursor:“pointer”, fontFamily:”‘Courier New’,monospace”});

return (
<div style={{minHeight:“100vh”, background:“linear-gradient(135deg,#0f1923 0%,#1a2744 50%,#0f2518 100%)”}}>
